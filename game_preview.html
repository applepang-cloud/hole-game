<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>홀 인 더 다크 — 맵 미리보기 (1-6)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0d12;color:#eee;-webkit-user-select:none;user-select:none}
/* ── 메뉴 ── */
#menu{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;background:radial-gradient(ellipse at 50% 30%,#1a2a4a,#0a0d12)}
#menu h1{font-size:28px;font-weight:900;letter-spacing:2px;color:#fff;
  text-shadow:0 4px 0 #e8552d,0 7px 0 #b53d18,0 10px 14px #0006}
#menu .sub{font-size:13px;opacity:.6;margin-top:-10px}
#mapGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:min(92vw,400px)}
.mcard{background:#1a2030;border:2px solid #334;border-radius:14px;padding:12px 10px;
  text-align:center;cursor:pointer;transition:.15s}
.mcard:hover{transform:translateY(-3px);border-color:#5a8fff;background:#1e2840}
.mcard:active{transform:translateY(0)}
.mcard .ico{font-size:28px;margin-bottom:6px}
.mcard .name{font-size:13px;font-weight:700;color:#ddd}
.mcard .tag{font-size:10px;opacity:.55;margin-top:3px}
/* ── 게임 ── */
#gameWrap{position:fixed;inset:0;z-index:1;display:none}
canvas#g{display:block;width:100%;height:100%;touch-action:none}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:5;padding:10px 12px;
  display:flex;gap:8px;align-items:center;pointer-events:none}
.pill{background:rgba(15,17,25,.78);border:1px solid rgba(255,255,255,.14);border-radius:14px;
  padding:6px 12px;font-size:13px;backdrop-filter:blur(4px)}
.pill b{font-size:17px;color:#ffd54a}
#barWrap{flex:1;max-width:220px;height:12px;background:rgba(15,17,25,.6);
  border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
#bar{height:100%;width:0;background:linear-gradient(90deg,#5ad17a,#8fe0a0);transition:width .15s}
#timeP b{color:#8fd2f5}
#holeP b{color:#ff7eab}
/* 뒤로 버튼 */
#backBtn{position:fixed;top:10px;right:12px;z-index:6;background:rgba(15,17,25,.8);
  border:1px solid #445;color:#ccc;border-radius:10px;padding:6px 12px;
  font-size:12px;cursor:pointer;pointer-events:auto}
#backBtn:hover{background:rgba(40,44,60,.9)}
/* 조이스틱 */
#stick{position:fixed;left:26px;bottom:90px;width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.18);
  z-index:5;display:none;touch-action:none}
#stick.on{display:block}
#knob{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.5)}
/* 결과 */
#over{position:fixed;inset:0;z-index:9;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;background:rgba(6,7,12,.82)}
#over.show{display:flex}
#over h1{font-size:34px}
#over .sub{font-size:14px;opacity:.8}
.btn{background:#5a4fb0;color:#fff;border:none;border-radius:10px;padding:10px 22px;
  font-size:14px;cursor:pointer;font-weight:700}
.btn:hover{background:#6e62c0}
.btn.sec{background:#2a2d38;border:1px solid #555}
/* 힌트 */
#hint{position:fixed;left:0;right:0;bottom:60px;text-align:center;font-size:12px;
  opacity:.55;z-index:4;pointer-events:none;transition:opacity 1s}
#hint.hide{opacity:0}
</style>
</head>
<body>

<!-- ── 맵 선택 화면 ── -->
<div id="menu">
  <h1>🕳️ 홀 인 더 다크</h1>
  <div class="sub">맵을 선택해 씽크홀을 채우세요</div>
  <div id="mapGrid"></div>
</div>

<!-- ── 게임 화면 ── -->
<div id="gameWrap">
  <canvas id="g"></canvas>
  <div id="hud">
    <div class="pill">크기 <b id="sizeV">--</b></div>
    <div id="barWrap"><div id="bar"></div></div>
    <div class="pill">🕳️ <b id="holeV">--</b></div>
    <div class="pill" style="margin-left:auto">⏱ <b id="timeV">--</b></div>
  </div>
  <button id="backBtn">← 맵 선택</button>
  <div id="stick"><div id="knob"></div></div>
  <div id="hint">방향키·WASD 또는 화면 드래그로 굴려요</div>
</div>

<!-- ── 결과 ── -->
<div id="over">
  <h1 id="overTitle">🎉 클리어!</h1>
  <div class="sub" id="overSub"></div>
  <div style="display:flex;gap:10px">
    <button class="btn" id="retryBtn">다시 하기</button>
    <button class="btn sec" id="menuBtn">맵 선택</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   맵 설정
══════════════════════════════════════════ */
const MAPS=[
  {name:'내 방',       ico:'🛏️', tag:'실내',    bound:13, indoor:true,  floorC:0xe7c9a0, wallC:0xc7d8e8, fogC:0x2a2230, fogN:18,fogF:58,
   ambC:0xffe6c0, sunC:0xffd9a0, sunI:0.45, sunP:[-2,8,-4],
   objColors:[0xd44a2e,0x4a7fcc,0x8a6fba,0xe8b84b,0x5cba7a,0x9e6343,0xd4c89e,0x6688aa],
   propTypes:['box','cyl','box','box','cyl'], holeN:12, bigHoleN:3, timeS:140},
  {name:'우리 마당',   ico:'🌿', tag:'실외',    bound:29, indoor:false, skyC:0xa9def7, groundC:0x83cf4e, fogC:0xbfeaff, fogN:70,fogF:160,
   ambC:0xffffff, sunC:0xfff2d6, sunI:0.62, sunP:[18,34,14],
   objColors:[0x6fa838,0x3d7a2e,0xa8723c,0xd44a2e,0xe0d0a0,0x8855aa,0xf0c040,0x5588cc],
   propTypes:['cone','box','cyl','box','sph'], holeN:15, bigHoleN:4, timeS:150},
  {name:'대형 마트',   ico:'🛒', tag:'실내',    bound:20, indoor:true,  floorC:0xeaecee, wallC:0xd6dde4, fogC:0xdfe7ee, fogN:34,fogF:100,
   ambC:0xeaf4ff, sunC:0xeef4ff, sunI:0.55, sunP:[10,30,8],
   objColors:[0xe74c3c,0x2980b9,0x27ae60,0xf39c12,0x8e44ad,0xd0d8e0,0x2c3e50,0xe0c0a0],
   propTypes:['box','box','cyl','box','box'], holeN:14, bigHoleN:4, timeS:160},
  {name:'학교',        ico:'🏫', tag:'실내',    bound:17, indoor:true,  floorC:0xd8cdb8, wallC:0xcfe0d2, fogC:0xdfe6dd, fogN:34,fogF:100,
   ambC:0xffffff, sunC:0xfff6e0, sunI:0.6, sunP:[12,30,10],
   objColors:[0x3e7fcf,0xe8762a,0x2e9b5e,0xd43030,0x8a6030,0x558855,0xaa7722,0x5577aa],
   propTypes:['box','box','box','cyl','box'], holeN:12, bigHoleN:4, timeS:160},
  {name:'도시 거리',   ico:'🏙️', tag:'실외',    bound:31, indoor:false, skyC:0xcdd6e0, groundC:0x8a8f96, fogC:0xbcc4cf, fogN:55,fogF:150,
   ambC:0xcdd6e0, sunC:0xeef0f4, sunI:0.5, sunP:[14,32,10],
   objColors:[0x3e3e3e,0x6688aa,0x884422,0x6e6e8e,0xd43030,0x44a0cc,0xffcf40,0x998877],
   propTypes:['box','box','box','cyl','box'], holeN:16, bigHoleN:5, timeS:180},
  {name:'저승 공동묘지',ico:'💀',tag:'실외',    bound:28, indoor:false, skyC:0x2a2740, groundC:0x3a4a3f, fogC:0x191626, fogN:20,fogF:62,
   ambC:0x2a2740, sunC:0x9fb0d0, sunI:0.28, sunP:[-10,30,-14],
   objColors:[0x8888aa,0x446644,0x6655aa,0xaaaa88,0x447766,0x553366,0x335533,0x7a8090],
   propTypes:['box','cone','box','cyl','box'], holeN:18, bigHoleN:5, timeS:210},
];

/* ══════════════════════════════════════════
   Three.js 초기화
══════════════════════════════════════════ */
const canvas=document.getElementById('g');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,1,.1,400);
camera.position.set(0,12,14);
camera.lookAt(0,0,0);

const clock=new THREE.Clock();

/* ══════════════════════════════════════════
   게임 상태
══════════════════════════════════════════ */
let ballMesh,ballR=0.25,ballVx=0,ballVz=0,ballX=0,ballZ=0;
let props=[],holes=[],totalHoles=0;
let timeLeft=180,ended=false,won=false;
let curMapId=0;
let frameId=null;
let goalR=1.85; // 크기 목표(구멍 없을 때)
const GOAL_R=1.85, START_R=0.25;

/* ══════════════════════════════════════════
   유틸
══════════════════════════════════════════ */
const rng=(a,b)=>a+(Math.random()*(b-a));
const MAT=(c,s=8)=>new THREE.MeshPhongMaterial({color:c,shininess:s});
function hexC(n){ return '#'+n.toString(16).padStart(6,'0'); }

/* ══════════════════════════════════════════
   맵 빌드
══════════════════════════════════════════ */
let mapGroup=null;

function buildMap(id){
  if(mapGroup){ scene.remove(mapGroup); }
  mapGroup=new THREE.Group();
  scene.add(mapGroup);
  props=[]; holes=[];
  const M=MAPS[id];

  // 안개·배경
  scene.fog=new THREE.Fog(M.fogC,M.fogN,M.fogF);
  renderer.setClearColor(M.fogC,1);

  // 조명
  while(scene.children.length>0 && scene.children.find(c=>c.isLight)) scene.remove(scene.children.find(c=>c.isLight));
  scene.children.filter(c=>c.isLight).forEach(l=>scene.remove(l));
  const sun=new THREE.DirectionalLight(M.sunC,M.sunI);
  sun.position.set(...M.sunP); sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.near=0.5; sun.shadow.camera.far=120;
  sun.shadow.camera.left=-50; sun.shadow.camera.right=50; sun.shadow.camera.top=50; sun.shadow.camera.bottom=-50;
  scene.add(sun);
  const hemi=new THREE.HemisphereLight(M.ambC,M.indoor?0x5a4a3a:0x9ec98a,0.55); scene.add(hemi);
  const amb=new THREE.AmbientLight(0xffffff,M.indoor?0.08:0.0); scene.add(amb);

  const H=M.bound;
  if(M.indoor){
    // 바닥
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(H*2,H*2),MAT(M.floorC,6));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; mapGroup.add(floor);
    // 선
    for(let i=-H+2;i<H;i+=4){
      const l=new THREE.Mesh(new THREE.PlaneGeometry(H*2,.08),new THREE.MeshBasicMaterial({color:M.floorC-0x101010,transparent:true,opacity:.4}));
      l.rotation.x=-Math.PI/2; l.position.set(0,.011,i); mapGroup.add(l);
    }
    // 4벽
    const WH=6.5,T=.6;
    [[0,-H,H*2,T],[0,H,H*2,T],[-H,0,T,H*2],[H,0,T,H*2]].forEach(([x,z,w,d])=>{
      const wall=new THREE.Mesh(new THREE.BoxGeometry(w,WH,d),MAT(M.wallC,3));
      wall.position.set(x,WH/2,z); wall.receiveShadow=true; mapGroup.add(wall);
    });
  } else {
    // 하늘 돔
    const dome=new THREE.Mesh(new THREE.SphereGeometry(H+60,16,10),
      new THREE.MeshBasicMaterial({color:M.skyC,side:THREE.BackSide,fog:false}));
    mapGroup.add(dome);
    // 바닥
    const ground=new THREE.Mesh(new THREE.CircleGeometry(H+30,40),MAT(M.groundC,2));
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; mapGroup.add(ground);
    // 도로(맵2/5만)
    if(id===1||id===4){
      const road=new THREE.Mesh(new THREE.PlaneGeometry(H*2.1,7),MAT(0xcaba8e,2));
      road.rotation.x=-Math.PI/2; road.position.y=.018; mapGroup.add(road);
    }
    // 저승: 달
    if(id===5){
      const moon=new THREE.Mesh(new THREE.CircleGeometry(7,20),
        new THREE.MeshBasicMaterial({color:0xdfe6c0,fog:false}));
      moon.position.set(-H*.3,H*.7,-H-18); mapGroup.add(moon);
      // 도깨비불
      [[-6,1.4,4],[7,1.4,-3],[2,1.2,-8]].forEach(([x,y,z])=>{
        const pt=new THREE.PointLight([0x7af0d0,0x9a7af5,0x7af0d0][Math.floor(Math.random()*3)],.9,14);
        pt.position.set(x,y,z); scene.add(pt);
      });
    }
  }

  // ── 소품 ──
  const objCount = M.indoor ? 55 : 80;
  const types=M.propTypes;
  for(let i=0;i<objCount;i++){
    let px,pz,t=0;
    do{ px=rng(-H+1,H-1); pz=rng(-H+1,H-1); t++; }while(Math.hypot(px,pz)<1.2&&t<20);
    const sc=rng(.6,1.8);
    const col=M.objColors[(Math.random()*M.objColors.length)|0];
    const ty=types[(Math.random()*types.length)|0];
    const obj=makeObj(ty,sc,col);
    obj.position.set(px,0,pz);
    obj.rotation.y=Math.random()*Math.PI*2;
    obj.castShadow=true;
    mapGroup.add(obj);
    props.push({mesh:obj,sc,active:true,px,pz});
  }

  // ── 씽크홀 ──
  const holeN=M.holeN;
  const bigN=M.bigHoleN;
  const occupied=[];
  function placeHole(r,isBig){
    let hx,hz,t2=0;
    do{
      hx=rng(-H+2,H-2); hz=rng(-H+2,H-2); t2++;
    }while((occupied.some(o=>Math.hypot(hx-o[0],hz-o[1])<r+o[2]+1.2)||Math.hypot(hx,hz)<1.5)&&t2<40);
    occupied.push([hx,hz,r]);
    const hMesh=makeHole(r);
    hMesh.position.set(hx,.01,hz);
    mapGroup.add(hMesh);
    holes.push({mesh:hMesh,r,hx,hz,isBig,filled:false,active:true});
  }
  // 작은 구멍 (채우기 타깃)
  for(let i=0;i<holeN;i++) placeHole(rng(.3,.9),false);
  // 큰 구멍 (빠지면 사망)
  for(let i=0;i<bigN;i++) placeHole(rng(1.4,1.9),true);

  totalHoles=holeN; // 작은 구멍만 목표

  // ── 공 ──
  if(ballMesh) scene.remove(ballMesh);
  ballR=START_R; ballX=0; ballZ=0; ballVx=0; ballVz=0;
  ballMesh=makeBall();
  ballMesh.position.set(0,ballR,0);
  scene.add(ballMesh);
}

function makeObj(type,sc,col){
  const g=new THREE.Group();
  let mesh;
  if(type==='box'){
    mesh=new THREE.Mesh(new THREE.BoxGeometry(sc*.8,sc,sc*.7),MAT(col));
    mesh.position.y=sc*.5;
  } else if(type==='cyl'){
    mesh=new THREE.Mesh(new THREE.CylinderGeometry(sc*.3,sc*.35,sc*.9,10),MAT(col));
    mesh.position.y=sc*.45;
  } else if(type==='cone'){
    mesh=new THREE.Mesh(new THREE.ConeGeometry(sc*.4,sc*.9,8),MAT(col));
    mesh.position.y=sc*.45;
  } else { // sph
    mesh=new THREE.Mesh(new THREE.SphereGeometry(sc*.4,10,8),MAT(col));
    mesh.position.y=sc*.4;
  }
  mesh.receiveShadow=true; mesh.castShadow=true;
  g.add(mesh);
  return g;
}

function makeHole(r){
  const g=new THREE.Group();
  // 어두운 원
  const disc=new THREE.Mesh(new THREE.CircleGeometry(r,20),
    new THREE.MeshBasicMaterial({color:0x050508}));
  disc.rotation.x=-Math.PI/2; disc.position.y=.015;
  g.add(disc);
  // 테두리
  const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.06,6,20),
    new THREE.MeshBasicMaterial({color:0x333355}));
  ring.rotation.x=-Math.PI/2; ring.position.y=.018;
  g.add(ring);
  return g;
}

function makeBall(){
  const g=new THREE.Group();
  const core=new THREE.Mesh(new THREE.SphereGeometry(1,14,10),
    new THREE.MeshPhongMaterial({color:0xf09a30,shininess:40,specular:0xffeedd}));
  core.castShadow=true;
  g.add(core);
  return g;
}

/* ══════════════════════════════════════════
   입력
══════════════════════════════════════════ */
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

// 터치 조이스틱
const stick=document.getElementById('stick');
const knob=document.getElementById('knob');
let joyX=0,joyZ=0,stickActive=false,stickId=-1,stickOX=0,stickOY=0;
const SR=52; // 조이스틱 반지름

window.addEventListener('touchstart',e=>{
  if(ended) return;
  for(const t of e.changedTouches){
    if(t.clientX>window.innerWidth*.5 || stickActive) continue;
    stickActive=true; stickId=t.identifier;
    stickOX=t.clientX; stickOY=t.clientY;
    stick.style.left=(t.clientX-60)+'px'; stick.style.bottom=(window.innerHeight-t.clientY-60)+'px';
    stick.classList.add('on');
  }
},{passive:true});
window.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier!==stickId) continue;
    const dx=t.clientX-stickOX,dy=t.clientY-stickOY;
    const d=Math.hypot(dx,dy),cl=Math.min(d,SR);
    const a=Math.atan2(dy,dx);
    knob.style.left=(60-25+Math.cos(a)*cl)+'px';
    knob.style.top=(60-25+Math.sin(a)*cl)+'px';
    joyX=Math.cos(a)*(cl/SR); joyZ=Math.sin(a)*(cl/SR);
  }
},{passive:true});
function endJoy(e){
  for(const t of e.changedTouches){
    if(t.identifier!==stickId) continue;
    stickActive=false; joyX=0; joyZ=0; stick.classList.remove('on');
    knob.style.left='35px'; knob.style.top='35px';
  }
}
window.addEventListener('touchend',endJoy,{passive:true});
window.addEventListener('touchcancel',endJoy,{passive:true});

/* ══════════════════════════════════════════
   게임 루프
══════════════════════════════════════════ */
const GRAVITY=-14;
let ballY=0,ballVy=0,onGround=true;

function getInput(){
  let ix=0,iz=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) ix=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) ix=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) iz=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) iz=1;
  if(stickActive){ ix+=joyX; iz+=joyZ; }
  const len=Math.hypot(ix,iz)||1;
  return [ix/len,iz/len];
}

function gameTick(dt){
  if(ended) return;

  timeLeft-=dt;
  if(timeLeft<=0){ timeLeft=0; finish(false,'⏰ 시간 초과!'); return; }

  // 입력
  const [ix,iz]=getInput();
  const spd=4.5+ballR*1.8;
  const acc=7;
  if(Math.abs(ix)>.01||Math.abs(iz)>.01){
    ballVx+=ix*acc*dt; ballVz+=iz*acc*dt;
  } else {
    ballVx*=Math.pow(.08,dt); ballVz*=Math.pow(.08,dt);
  }
  // 최대속도 제한
  const mv=spd*1.6,vl=Math.hypot(ballVx,ballVz);
  if(vl>mv){ ballVx=ballVx/vl*mv; ballVz=ballVz/vl*mv; }

  const M=MAPS[curMapId],H=M.bound;

  // 구멍 체크: 공이 구멍 위에 있는지 검사 → 빠지는 역학
  let inBigHole=null;
  let filledSmall=null;
  let nearHoleCenter=false;

  for(const h of holes){
    if(!h.active) continue;
    const dx=ballX-h.hx, dz=ballZ-h.hz;
    const dist=Math.hypot(dx,dz);
    if(dist<h.r+ballR*.4){
      if(h.isBig && ballR<h.r){
        // 큰 구멍 → 빠짐 판정 (공이 충분히 작을 때)
        if(dist<h.r-ballR*.5) inBigHole=h;
      } else if(!h.isBig && ballR>=h.r*.6){
        // 작은 구멍 → 채우기
        if(dist<h.r*.9) filledSmall=h;
      }
    }
  }

  // 수직 물리
  if(inBigHole){
    // 구멍 안으로 당겨짐
    const dx=inBigHole.hx-ballX, dz=inBigHole.hz-ballZ;
    ballVx+=dx*8*dt; ballVz+=dz*8*dt;
    if(!onGround){ ballVy+=GRAVITY*dt; }
    else { ballVy=-0.5; onGround=false; }
  } else {
    if(!onGround){ ballVy+=GRAVITY*dt; }
    if(ballY<=0){ ballY=0; ballVy=0; onGround=true; }
  }

  ballX+=ballVx*dt; ballZ+=ballVz*dt; ballY+=ballVy*dt;

  // 경계 반사
  const lim=H-ballR*.8;
  if(ballX<-lim){ ballX=-lim; ballVx=Math.abs(ballVx)*.4; }
  if(ballX>lim){ ballX=lim; ballVx=-Math.abs(ballVx)*.4; }
  if(ballZ<-lim){ ballZ=-lim; ballVz=Math.abs(ballVz)*.4; }
  if(ballZ>lim){ ballZ=lim; ballVz=-Math.abs(ballVz)*.4; }

  // 구멍에 빠짐 → 실패
  if(inBigHole && ballY<-ballR*2.5){
    finish(false,'😱 구멍에 빠졌어요!'); return;
  }

  // 소품 흡수
  for(const p of props){
    if(!p.active) continue;
    const dx=ballX-p.mesh.position.x, dz=ballZ-p.mesh.position.z;
    if(Math.hypot(dx,dz)<ballR+p.sc*.5 && ballR>p.sc*.5){
      p.active=false;
      mapGroup.remove(p.mesh);
      // 부피 성장
      const grow=Math.pow(p.sc,3)*.04;
      ballR=Math.pow(Math.pow(ballR,3)+grow,1/3);
      ballR=Math.min(ballR,GOAL_R+.5);
    }
  }

  // 작은 구멍 채우기
  if(filledSmall){
    filledSmall.filled=true; filledSmall.active=false;
    mapGroup.remove(filledSmall.mesh);
    // 구멍 채우면 약간 성장
    ballR=Math.pow(Math.pow(ballR,3)+.15,1/3);
    ballR=Math.min(ballR,GOAL_R+.5);
    // 클리어 체크
    const remaining=holes.filter(h=>!h.filled&&!h.isBig).length;
    if(remaining===0){ finish(true); return; }
  }

  // 크기 목표(구멍이 없는 경우 대비)
  if(holes.filter(h=>!h.isBig).length===0 && ballR>=GOAL_R){
    finish(true); return;
  }

  // 공 위치 업데이트
  ballMesh.position.set(ballX, Math.max(ballR, ballY+ballR), ballZ);
  ballMesh.scale.setScalar(ballR);
  // 굴림 회전
  const spn=Math.hypot(ballVx,ballVz)/(ballR||.01);
  ballMesh.rotation.x+=ballVz/(ballR||.01)*dt;
  ballMesh.rotation.z-=ballVx/(ballR||.01)*dt;

  // 카메라 따라가기
  const camH=Math.max(5, ballR*6+4);
  const camD=Math.max(8, ballR*7+7);
  camera.position.x+=(ballX-camera.position.x)*.07;
  camera.position.z+=(ballZ+camD-camera.position.z)*.07;
  camera.position.y+=(camH-camera.position.y)*.07;
  camera.lookAt(ballX,0,ballZ);

  // HUD 업데이트
  updateHUD();
}

function updateHUD(){
  const cm=ballR*100;
  document.getElementById('sizeV').textContent=cm<100?cm.toFixed(0)+'cm':(cm/100).toFixed(1)+'m';
  const remaining=holes.filter(h=>!h.filled&&!h.isBig).length;
  document.getElementById('holeV').textContent=remaining+'/'+totalHoles;
  const tl=Math.max(0,Math.ceil(timeLeft));
  document.getElementById('timeV').textContent=tl+'s';
  // 진행 바 (작은 구멍 채운 수 기준)
  const done=totalHoles-remaining;
  document.getElementById('bar').style.width=(totalHoles>0?done/totalHoles*100:0)+'%';
}

function finish(isWin, reason=''){
  if(ended) return;
  ended=true;
  setTimeout(()=>{
    document.getElementById('overTitle').textContent=isWin?'🎉 씽크홀 완전 제거!':'💀 실패!';
    const remaining=holes.filter(h=>!h.filled&&!h.isBig).length;
    document.getElementById('overSub').textContent=
      isWin ? `구멍을 모두 채웠어요! ★★★`
            : (reason||`남은 구멍: ${remaining}개`);
    document.getElementById('over').classList.add('show');
  },300);
}

/* ══════════════════════════════════════════
   렌더 루프
══════════════════════════════════════════ */
function resize(){
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

let lastT=0;
function renderLoop(t){
  frameId=requestAnimationFrame(renderLoop);
  const dt=Math.min((t-lastT)/1000,.05); lastT=t;
  gameTick(dt);
  renderer.render(scene,camera);
}

/* ══════════════════════════════════════════
   시작 / UI
══════════════════════════════════════════ */
function startGame(id){
  curMapId=id;
  ended=false; won=false;
  timeLeft=MAPS[id].timeS;
  document.getElementById('menu').style.display='none';
  document.getElementById('gameWrap').style.display='block';
  document.getElementById('over').classList.remove('show');
  resize();
  buildMap(id);
  updateHUD();
  lastT=performance.now();
  if(frameId) cancelAnimationFrame(frameId);
  frameId=requestAnimationFrame(renderLoop);
  // 힌트 페이드
  const hint=document.getElementById('hint');
  hint.classList.remove('hide');
  setTimeout(()=>hint.classList.add('hide'),5000);
}

function goMenu(){
  if(frameId){ cancelAnimationFrame(frameId); frameId=null; }
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('over').classList.remove('show');
  document.getElementById('menu').style.display='flex';
  ended=true;
}

// 맵 카드 생성
const grid=document.getElementById('mapGrid');
MAPS.forEach((m,i)=>{
  const card=document.createElement('div');
  card.className='mcard';
  card.innerHTML=`<div class="ico">${m.ico}</div><div class="name">${m.name}</div><div class="tag">${m.tag}</div>`;
  card.onclick=()=>startGame(i);
  grid.appendChild(card);
});

document.getElementById('backBtn').onclick=goMenu;
document.getElementById('menuBtn').onclick=goMenu;
document.getElementById('retryBtn').onclick=()=>startGame(curMapId);
</script>
