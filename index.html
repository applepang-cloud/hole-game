<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/hole-game/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hole_game">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>홀 인 더 다크 (Hole in the Dark)</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* 레이어 구조: 게임 iframe(아래) + Flutter(위, 투명 HUD 오버레이) — platform view 회피 */
    /* 평소엔 Flutter가 불투명하게 게임을 덮고, 플레이 중엔 Flutter를 투명+통과시켜 게임이 보이고 조작됨 */
    #holeGame{ position:fixed; inset:0; width:100%; height:100%; border:0; z-index:1;
      display:none; background:#0a0d12; }
    flutter-view{ z-index:2; }                       /* iframe(1) 위에 Flutter HUD(입력은 Flutter가 받아 게임으로 전달) */
    #holeBack{ position:fixed; top:12px; left:12px; z-index:10000; display:none;
      font:700 14px/1 "Malgun Gothic",sans-serif; color:#4a3b2a; cursor:pointer;
      background:#fff7e6; border:3px solid #fff; border-radius:12px; padding:9px 14px;
      box-shadow:0 4px 0 #d8c39a, 0 8px 18px #0004; }
    #holeGame.show, #holeBack.show{ display:block; }
  </style>
</head>
<body>
  <!-- 인게임 3D는 three.js(iframe), 셸·UI는 Flutter -->
  <iframe id="holeGame" title="game"
    allow="gyroscope; accelerometer; magnetometer; fullscreen; autoplay"></iframe>
  <button id="holeBack">← 홈</button>

  <script>
    // Flutter ↔ three.js 게임 브리지
    (function(){
      var frame = document.getElementById('holeGame');
      var back  = document.getElementById('holeBack');
      var SRC = 'game/index.html';
      function notify(type){ if(typeof window.__holeOnGameMsg==='function') window.__holeOnGameMsg(JSON.stringify({hole:true,type:type})); }
      var docEl = document.documentElement;
      // Flutter(Dart)에서 호출 — 게임 표시 + 해당 모드로 시작 + 플레이 모드(Flutter 투명·통과) 진입
      window.holeShowGame = function(mode){
        mode = mode || 'roll';
        if(!frame.src){
          frame.src = SRC + '?mode=' + mode;            // 최초 로드 → 게임이 자동 시작
        } else if(frame.contentWindow){
          frame.contentWindow.postMessage({holeCmd:'restart', mode:mode}, '*');  // 재사용 → 재시작
        }
        frame.classList.add('show'); back.classList.add('show');
        docEl.classList.add('playing');               // Flutter HUD 통과 모드
      };
      // Flutter에서 호출 — 게임 숨김(홈/엔드카드 복귀) + UI 모드(Flutter 불투명·조작 가능)
      window.holeHideGame = function(){
        frame.classList.remove('show'); back.classList.remove('show');
        docEl.classList.remove('playing');
      };
      // Flutter에서 호출 — 엔드카드 "다시 하기"(같은 모드 재시작)
      window.holeRestart = function(mode){ window.holeShowGame(mode); };
      // Flutter HUD → 게임 이동 입력 전달(조이스틱 벡터, -1..1)
      window.holeInput = function(x,y){
        try{ var e=frame.contentWindow && frame.contentWindow.__holeEngine; if(e && e.input) e.input(x,y); }catch(_){}
      };
      // Flutter 일시정지/재개
      window.holePause  = function(){ try{ frame.contentWindow.__holeEngine.pause(); }catch(_){} };
      window.holeResume = function(){ try{ frame.contentWindow.__holeEngine.resume(); }catch(_){} };
      // 홈 메뉴 + 스토리 대사 배경음악(main) — 게임의 mp3와 별개(셸에서 재생)
      var menuMus=null, menuOn=false;
      window.holeMenuMusic = function(on){
        on = !!on;
        if(on===menuOn && menuMus) return;
        menuOn = on;
        if(!menuMus){ menuMus=new Audio('main.mp3'); menuMus.loop=true; menuMus.volume=0.4; }
        if(on){ var p=menuMus.play(); if(p&&p.catch) p.catch(function(){}); }
        else { menuMus.pause(); }
      };
      // 스토리 진행도 저장(클리어한 맵 번호, 콤마구분)
      window.holeGetCleared = function(){ try{ return localStorage.getItem('hole.cleared')||''; }catch(_){ return ''; } };
      window.holeSetCleared = function(s){ try{ localStorage.setItem('hole.cleared', s||''); }catch(_){} };
      // Flutter HUD 오디오/자이로 토글 → 게임 기존 핸들러 재사용
      window.holeToggle = function(what){
        try{
          var e=frame.contentWindow && frame.contentWindow.__holeEngine; if(!e) return;
          if(what==='music') e.toggleMusic();
          else if(what==='sound') e.toggleSound();
          else if(what==='gyro') e.toggleGyro();
          else if(what==='tab') e.openTab();
        }catch(_){}
      };
      back.addEventListener('click', function(){ window.holeHideGame(); notify('home'); });
      // 게임 → Flutter 메시지 중계 (Dart가 window.__holeOnGameMsg 등록)
      window.addEventListener('message', function(e){
        var d = e.data;
        if(d && typeof d === 'object' && d.hole && typeof window.__holeOnGameMsg === 'function'){
          window.__holeOnGameMsg(JSON.stringify(d));
        }
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
