<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>홀 인 더 다크 (Hole in the Dark)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gothic+A1:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#aee5ff; --cream:#fff7e6; --ink:#4a3b2a; --muted:#9b8a72;
    --red:#ef5350; --grn:#7bbf3a; --org:#e8552d; --pur:#7a4fb0; --blu:#4fb0e0; --yel:#f4c430;
    --line:#e7d8be;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;width:100%}
  body{
    background:#0a0d12; color:var(--ink);
    font-family:"Gothic A1", system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center;
    height:100%; width:100%; overflow:hidden;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .jua{ font-family:"Jua", "Gothic A1", sans-serif; }
  .screen{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0a0d12; }
  .stage{ position:relative; overflow:hidden; background:#aee5ff; box-shadow:0 0 0 100vmax #0a0d12; }
  canvas#g{ display:block; width:100%; height:100%; }

  .hud{ position:absolute; inset:0; pointer-events:none; z-index:4; }
  /* 임베드 시 HUD·오디오바·조이스틱은 Flutter 오버레이가 담당(입력은 __holeEngine로 전달받음) */
  body.embedded .hud, body.embedded .audiobar, body.embedded .stick{ display:none !important; }
  .top{ position:absolute; top:10px; left:10px; right:10px; display:flex; gap:8px; align-items:flex-start; justify-content:space-between; }
  .panel{ background:var(--cream); border:3px solid #fff; border-radius:14px; box-shadow:0 4px 0 #d8c39a, 0 8px 18px #0003; }
  .sizebox{ padding:7px 13px 8px; text-align:center; min-width:118px; }
  .sizebox .lbl{ font-size:10px; color:var(--muted); letter-spacing:1px; }
  .sizebox .val{ font-family:"Jua",sans-serif; font-size:25px; line-height:1.05; color:var(--org); }
  .sizebox .val small{ font-size:14px; color:var(--ink); }
  .rightcol{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  .timebox{ padding:6px 12px; font-family:"Jua",sans-serif; font-size:20px; color:var(--ink); }
  .timebox.warn{ color:var(--red); animation:pulse .5s infinite alternate; }
  @keyframes pulse{ to{ transform:scale(1.08) } }
  .countbox{ padding:5px 11px; font-size:13px; font-weight:800; color:var(--grn); }
  .countbox b{ font-family:"Jua",sans-serif; font-size:16px; }

  .goalwrap{ position:absolute; left:50%; top:62px; transform:translateX(-50%); width:min(74%,300px); }
  .goalbar{ height:15px; background:#ffffffcc; border:3px solid #fff; border-radius:20px; overflow:hidden;
    box-shadow:0 3px 0 #d8c39a; position:relative; }
  .goalbar > i{ position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(90deg,#9be15d,#5fb524); transition:width .25s ease; }
  .goalbar > span{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:800; color:#3c5a18; text-shadow:0 1px 0 #fff; }

  .hpwrap{ position:absolute; left:10px; bottom:16px; display:flex; align-items:center; gap:6px; width:168px; z-index:5; }
  .hpwrap .hpico{ font-size:15px; filter:drop-shadow(0 1px 1px #0006); }
  .hpbar{ flex:1; position:relative; height:15px; background:#00000055; border:2px solid #fff; border-radius:10px; overflow:hidden; box-shadow:0 2px 0 #0003; }
  .hpbar > i{ display:block; height:100%; width:100%; background:#4ad06a; transition:width .2s ease, background .2s; }
  .hpbar .hpnum{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:#fff; text-shadow:0 1px 2px #000a; }
  #countdown{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; z-index:9;
    pointer-events:none; font-size:140px; font-weight:900; color:#fff;
    text-shadow:0 6px 0 #e8552d, 0 10px 24px #0008; }
  #countdown.show{ display:flex; }
  #countdown.pop{ animation:cdpop 0.5s ease-out; }
  @keyframes cdpop{ 0%{ transform:scale(2.2); opacity:0; } 35%{ transform:scale(1); opacity:1; } 100%{ transform:scale(0.7); opacity:0.2; } }
  #pauseBtn{ position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:6;
    width:42px; height:42px; border-radius:50%; border:3px solid #fff; background:var(--cream);
    box-shadow:0 4px 0 #d8c39a; font-size:17px; cursor:pointer; color:var(--ink); pointer-events:auto; }
  #pauseBtn:active{ transform:translateX(-50%) translateY(2px); box-shadow:0 2px 0 #d8c39a; }
  body.embedded #pauseBtn, body.embedded #pauseVeil{ display:none !important; }
  .audiobar{ position:absolute; right:10px; bottom:14px; display:flex; gap:7px; z-index:6; pointer-events:auto; }
  .audiobar button{ width:42px; height:42px; border-radius:50%; border:3px solid #fff; background:var(--cream);
    box-shadow:0 4px 0 #d8c39a; font-size:17px; cursor:pointer; color:var(--ink); }
  .audiobar button.off{ opacity:.45; }
  .toast{ position:absolute; left:50%; bottom:70px; transform:translateX(-50%);
    max-width:84%; background:#1a2030f2; color:#fff; font-size:12px; line-height:1.5; font-weight:700;
    padding:10px 14px; border-radius:12px; border:2px solid #ffffff33; z-index:9; text-align:center;
    box-shadow:0 8px 24px #0006; pointer-events:none; }
  .toast.hidden{ display:none; }

  /* floating joystick */
  .stick{ position:absolute; z-index:5; width:120px; height:120px; border-radius:50%;
    background:#ffffff33; border:3px solid #ffffff88; pointer-events:none; display:none; }
  .stick i{ position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%;
    background:linear-gradient(#fff,#ffe7bd); border:3px solid #fff; box-shadow:0 3px 8px #0004; }

  .veil{ position:absolute; inset:0; z-index:8; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; text-align:center; pointer-events:auto;
    background:radial-gradient(120% 90% at 50% 24%, #bfeaff 0%, #8fd2f5 46%, #6cc05e 100%); }
  .veil.hidden{ display:none; }
  /* 시작화면은 모드 3개라 길어질 수 있어 위에서부터 스크롤 가능하게 */
  #start{ justify-content:flex-start; gap:9px; padding:16px 10px 26px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  #start h1{ font-size:32px; }
  #start .prince-emoji{ font-size:30px; }
  .veil h1{ font-family:"Jua",sans-serif; margin:0; color:#fff; font-size:40px; letter-spacing:2px;
    text-shadow:0 4px 0 var(--org), 0 7px 0 #b53d18, 0 10px 14px #0004; }
  .veil .sub{ font-family:"Jua",sans-serif; color:#fff; font-size:15px; margin-top:-6px;
    text-shadow:0 2px 0 #3c8a3c, 0 4px 8px #0003; }
  .veil p{ max-width:330px; font-size:13px; line-height:1.85; color:#fff; margin:0 18px;
    text-shadow:0 1px 3px #0005; }
  .card{ background:var(--cream); border:4px solid #fff; border-radius:20px; padding:16px 20px; box-shadow:0 8px 0 #d8c39a, 0 14px 30px #0004; }
  .card .big{ font-family:"Jua",sans-serif; font-size:30px; color:var(--org); }
  .card .row{ font-size:13px; color:var(--ink); margin-top:4px; font-weight:700; }
  .btn{ font-family:"Jua",sans-serif; font-size:19px; color:#fff; letter-spacing:1px; cursor:pointer;
    background:linear-gradient(#ff8a4a,#ef5d1e); border:none; border-radius:16px; padding:13px 30px;
    box-shadow:0 6px 0 #b23f12, 0 10px 16px #0004; }
  .btn:active{ transform:translateY(3px); box-shadow:0 3px 0 #b23f12; }
  .btn.ghost{ background:#ffffffdd; color:var(--org); box-shadow:0 6px 0 #d8c39a, 0 10px 16px #0004; }
  .btn.ghost:active{ box-shadow:0 3px 0 #d8c39a; }
  .modes{ display:flex; flex-direction:column; gap:9px; width:min(88%,330px); }
  .modebtn{ display:flex; flex-direction:column; align-items:center; gap:1px; cursor:pointer;
    background:var(--cream); border:4px solid #fff; border-radius:16px; padding:10px 14px;
    box-shadow:0 6px 0 #4a8f3a, 0 10px 18px #0004; position:relative; }
  .modebtn.hole{ box-shadow:0 6px 0 #2b2335, 0 10px 18px #0004; }
  .modebtn.room{ box-shadow:0 6px 0 #2a5a9c, 0 10px 18px #0004; }
  .modebtn:active{ transform:translateY(3px); box-shadow:0 3px 0 #4a8f3a; }
  .modebtn.hole:active{ box-shadow:0 3px 0 #2b2335; }
  .modebtn.room:active{ box-shadow:0 3px 0 #2a5a9c; }
  .modebtn .ic{ font-size:26px; line-height:1; }
  .modebtn b{ font-family:"Jua",sans-serif; font-size:17px; color:var(--ink); }
  .modebtn em{ font-style:normal; font-size:10.5px; color:var(--muted); text-align:center; }
  .hint{ font-size:11px; color:#ffffffcc; text-shadow:0 1px 2px #0004; }
  .credit{ position:absolute; bottom:10px; font-size:10px; color:#ffffffaa; }
  .prince-emoji{ font-size:48px; filter:drop-shadow(0 6px 6px #0003); }
</style>
</head>
<body>
<div class="screen">
  <div class="stage" id="stage">
    <canvas id="g"></canvas>

    <div class="hud" id="hud">
      <div class="top">
        <div class="panel sizebox">
          <div class="lbl">크기</div>
          <div class="val" id="sizeVal">60<small>cm</small></div>
        </div>
        <div class="rightcol">
          <div class="panel timebox" id="timeBox">3:00</div>
          <div class="panel countbox"><span id="cntLabel">모은 물건</span> <b id="cnt">0</b></div>
        </div>
      </div>
      <div class="goalwrap">
        <div class="goalbar"><i id="goalFill"></i><span id="goalTxt">목표까지</span></div>
      </div>
      <div class="hpwrap" id="hpWrap" style="display:none">
        <span class="hpico">❤️</span>
        <div class="hpbar"><i id="hpFill"></i><span class="hpnum" id="hpNum">300</span></div>
      </div>
    </div>

    <div class="audiobar">
      <button id="bTab" title="새 탭에서 열기">↗</button>
      <button id="bGyro" class="off" title="기울기 조작">📱</button>
      <button id="bMusic" title="음악">♪</button>
      <button id="bSound" title="효과음">🔊</button>
    </div>
    <div id="toast" class="toast hidden"></div>
    <div id="countdown" class="jua">3</div>

    <div class="stick" id="stick"><i id="stickKnob"></i></div>

    <button id="pauseBtn" title="일시정지">⏸</button>
    <div class="veil hidden" id="pauseVeil">
      <h1 class="jua">일시정지</h1>
      <button class="btn" id="pResume">▶  계속하기</button>
      <button class="btn" id="pAgain">🔄  다시하기</button>
      <button class="btn ghost" id="pHome">🏠  홈으로</button>
    </div>

    <div class="veil" id="start">
      <div class="prince-emoji">🤴</div>
      <h1 class="jua">홀 인 더 다크</h1>
      <div class="sub">Hole in the Dark · 퇴마사 소년</div>
      <p style="font-size:12px;margin:2px 14px">맵을 골라 굴려줘 · 화면을 <b>끌거나</b> 방향키로 이동</p>
      <div class="modes">
        <button class="modebtn" id="mapBtn1">
          <span class="ic">🛏️</span>
          <b>맵 1 · 내 방</b>
          <em>개미·쥐·고양이를 굴려서 납작! 창밖엔 누가…</em>
        </button>
        <button class="modebtn" id="mapBtn2">
          <span class="ic">🌳</span>
          <b>맵 2 · 우리 마당</b>
          <em>정원·집·자동차, 구멍에서 유령이 스멀스멀</em>
        </button>
        <button class="modebtn room" id="mapBtn3">
          <span class="ic">🛒</span>
          <b>맵 3 · 대형 마트</b>
          <em>좀비가 구멍에서! 구멍을 메워 막아라</em>
        </button>
        <button class="modebtn" id="mapBtn4">
          <span class="ic">🏫</span>
          <b>맵 4 · 학교</b>
          <em>교실·사물함, 도깨비·해골이 구멍에서</em>
        </button>
        <button class="modebtn room" id="mapBtn5">
          <span class="ic">🏙️</span>
          <b>맵 5 · 도시 거리</b>
          <em>빌딩·버스·시민, 구멍서 도깨비·유령</em>
        </button>
        <button class="modebtn hole" id="mapBtn6">
          <span class="ic">⚰️</span>
          <b>맵 6 · 저승 공동묘지</b>
          <em>묘비·도깨비불, 해골·유령·저승사자</em>
        </button>
        <button class="modebtn hole" id="eventToggle" style="opacity:.92">
          <span class="ic">🎪</span>
          <b>이벤트 모드</b>
          <em>고전 모드 2종 (탭하면 펼쳐짐)</em>
        </button>
        <div id="eventModes" class="hidden" style="display:flex;flex-direction:column;gap:9px;width:100%">
          <button class="modebtn" id="modeRoll">
            <span class="ic">🟢</span>
            <b>공 굴리기</b>
            <em>끈끈한 공에 물건을 붙여 키운다</em>
          </button>
          <button class="modebtn hole" id="modeHole">
            <span class="ic">⚫</span>
            <b>구멍 빨아들이기</b>
            <em>구멍으로 물건을 쏙쏙 삼킨다</em>
          </button>
          <button class="modebtn" id="modeSnow">
            <span class="ic">⛄</span>
            <b>눈사람 만들기</b>
            <em>눈덩이를 굴려 키워 눈사람 완성!</em>
          </button>
        </div>
      </div>
      <div class="hint">📱 버튼을 켜면 기울기로 조작 · 🔊 소리 켜면 더 신난다</div>
      <div class="credit">반다이남코 「괴혼(카타마리 다마시)」 시리즈에서 영감 · 오리지널 로우폴리 오마주</div>
    </div>

    <div class="veil hidden" id="end">
      <h1 class="jua" id="endTitle">완성!</h1>
      <div class="card">
        <div class="big" id="endSize">2m 20cm</div>
        <div class="row" id="endCount">모은 물건 0개</div>
        <div class="row" id="endMsg"></div>
      </div>
      <button class="btn" id="againBtn">다시 하기</button>
      <button class="btn ghost" id="menuBtn">모드 선택</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
"use strict";

/* ===================== 기본 설정 ===================== */
const VIEW = { w: 360, h: 640 };
const GROUND = 120;           // 월드 반경(±)
const ROUND_TIME = 180;       // 제한 시간(초)
const START_R = 0.3;          // 시작 반지름(50%↓ — 작게 시작해 천천히 키움)
const PICK_RATIO = 0.78;      // [굴리기] 물건 ≤ 공반지름*이 값 → 흡수
const ABSORB = 4.6;           // [굴리기] 성장 계수
const HOLE_PICK = 0.86;       // [구멍] 물건 ≤ 구멍반지름*이 값 → 흡수
const ABSORB_H = 1.55;        // [구멍] 성장 계수(면적)
const GOAL = { roll:2.2, hole:2.8 };   // 모드별 목표 반지름
const MAX_STUCK = 230;        // 표시 유지 최대 부착물

let MODE = 'roll';            // 'roll' | 'hole'
let DUNG = 0;                 // 쇠똥구리: 0=아님 1=마을(산) 2=도시
let sensitivity = 1.0;        // 볼 민감도(일시정지서 조절, 기본 1.0)
const goalR = ()=> DUNG ? (DUNG===2 ? 2.6 : 2.2) : GOAL[MODE];

const stageEl = document.getElementById('stage');
const cv = document.getElementById('g');

let renderer, scene, camera, sun, skyDome;
let hemiL, ambL, fillL, rimL, mapLightGroup=null, mapLights=[], sunOff=[18,34,14];   // 맵별 조명
let ballGroup, core, prince, holeGroup;
let outdoorGroup, roomGroup, blueBall, blueCore;
let holes = [];               // [방] 검은 구멍들 {grp,x,z,r}
let roomTotal = 0;            // [방] 시작 구멍 수
let roomSink = null;          // [방] 빠지는 연출 상태
let stuck = [];               // [굴리기] {grp, dir}
let falling = [];             // [구멍] 빨려드는 애니메이션 중인 물건
let loose = [];               // {grp, x, z, y, size}
let ball = { x:0, z:0, r:START_R, vol:0, area:Math.PI*START_R*START_R, heading:0, score:0 };
let camYaw = 0;
let running = false, ended = false, timeLeft = ROUND_TIME, countdown = 0;   // countdown: 시작 전 3-2-1 대기(초)

/* ===================== 렌더러/씬 ===================== */
function initThree(){
  renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(1.5, window.devicePixelRatio||1));   // 모바일 GPU 부하↓(컨텍스트 손실 방지)
  // WebGL 컨텍스트 손실 시 영구 검정화면 방지(자동 복구)
  cv.addEventListener('webglcontextlost', function(e){ e.preventDefault(); }, false);
  cv.addEventListener('webglcontextrestored', function(){ try{ renderer.setClearColor(renderer.getClearColor(new THREE.Color())); }catch(_){} }, false);
  renderer.setClearColor(0xaee5ff, 1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  // (톤매핑·sRGB 제거 — 기존의 깔끔한 색감으로 복귀)

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xbfeaff, 70, 160);

  camera = new THREE.PerspectiveCamera(52, VIEW.w/VIEW.h, 0.1, 600);
  camera.position.set(0, 5.4, -7.4);

  hemiL = new THREE.HemisphereLight(0xffffff, 0x9ec98a, 0.62);
  scene.add(hemiL);
  ambL = new THREE.AmbientLight(0xffffff, 0.0); scene.add(ambL);   // 기본 0(맵별로만 소량)
  sun = new THREE.DirectionalLight(0xfff2d6, 0.6);
  sun.position.set(18, 34, 14);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 90;
  sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
  sun.shadow.camera.top=20; sun.shadow.camera.bottom=-20;
  sun.shadow.bias = -0.0008; sun.shadow.normalBias = 0.04;
  scene.add(sun); scene.add(sun.target);
  fillL = new THREE.DirectionalLight(0xbfe0ff, 0.16);
  fillL.position.set(-30, 25, -20);
  scene.add(fillL);
  rimL = new THREE.DirectionalLight(0xffffff, 0.0);   // 기본 끔
  rimL.position.set(-10, 16, -28);
  scene.add(rimL);
  mapLightGroup = new THREE.Group(); scene.add(mapLightGroup);

  buildSky();
  buildEnvironment();
  buildBall();
  buildPrince();
  buildHole();
  buildRoom();
  buildBlueBall();
}

// 그림자 광원이 플레이어를 따라오게 (선명한 근거리 그림자)
function followSun(){
  if(!sun) return;
  sun.position.set(ball.x+sunOff[0], sunOff[1], ball.z+sunOff[2]);
  sun.target.position.set(ball.x, 0, ball.z);
  sun.target.updateMatrixWorld();
}

// 그라데이션 하늘 돔
function buildSky(){
  const c=document.createElement('canvas'); c.width=16; c.height=256;
  const g=c.getContext('2d'); const grd=g.createLinearGradient(0,0,0,256);
  grd.addColorStop(0.0,'#3aa0e8'); grd.addColorStop(0.45,'#7fc6f0');
  grd.addColorStop(0.78,'#bfe6fb'); grd.addColorStop(1.0,'#e8f7ff');
  g.fillStyle=grd; g.fillRect(0,0,16,256);

function populateRoom(){
  holes=[];
  const sizes=[0.4,0.45,0.5,0.55,0.6,0.7,0.8,0.9,1.0,1.1,1.2,1.3];
  for(const r of sizes){
    let x,z,ok=false,tries=0;
    do{ x=rand(-(ROOM_HALF-2),ROOM_HALF-2); z=rand(-(ROOM_HALF-2),ROOM_HALF-2);
        ok=Math.hypot(x,z)>5.5;
        for(const h of holes) if(Math.hypot(x-h.x,z-h.z) < r+h.r+1.2) ok=false;
        tries++; }while(!ok && tries<60);
    const g=buildHoleMesh(r); g.position.set(x,0,z); scene.add(g);
    holes.push({grp:g,x,z,r});
  }
  roomTotal=holes.length;
  // 성장용 물건(중간 크기 위주)
  const makers=[buildApple,buildOrange,buildMug,buildPudding,buildToast,buildMushroom,
                buildSushi,buildApple,buildOrange,buildMug,buildDie,buildCandy,buildFlower];
  for(let i=0;i<74;i++){
    const make=makers[(Math.random()*makers.length)|0];
    const x=rand(-(ROOM_HALF-2),ROOM_HALF-2), z=rand(-(ROOM_HALF-2),ROOM_HALF-2);
    let bad=false; for(const h of holes) if(Math.hypot(x-h.x,z-h.z)<h.r+0.5) bad=true;
    if(bad) continue;
    addProp(make(), x, z);
  }
}
function roomSwallow(item){
  loose.splice(loose.indexOf(item),1);
  falling.push({ grp:item.grp, x0:item.x, z0:item.z, y0:(item.y||0.15)+0.1,
    t:0, dur:0.4, spin:rand(4,9), tilt:rand(3,7), toY:Math.max(0.3,ball.r*0.5) });
  ball.vol += Math.pow(item.size,3)*ABSORB_ROOM;
  ball.score++;
  refreshBlue();
  SFX.pop(ball.score);
}
function clearHole(h,i){
  spawnPuff(h.x,h.z); spawnPuff(h.x,h.z);
  scene.remove(h.grp); holes.splice(i,1);
  ball.vol += h.r*h.r*h.r*1.5; refreshBlue();   // 구멍을 메우며 성장
  SFX.loot(); updateHUD();
  if(holes.length===0 && !ended) finish(true);
}
function fallIn(h){
  if(ended) return;
  roomSink={ x:h.x, z:h.z, t:0 };
  finish(false, '구멍에 빠졌다…');
}
function updateRoom(dt){
  if(roomSink) return;
  const inp=inputVector();
  const speed=(6.0+ball.r*1.5)*inp.m;
  if(inp.m>0.01){
    const Fx=Math.sin(camYaw),Fz=Math.cos(camYaw),Rx=Math.cos(camYaw),Rz=-Math.sin(camYaw);
    let ux=Fx*(-inp.y)-Rx*inp.x, uz=Fz*(-inp.y)-Rz*inp.x;   // 좌우 반전 일관
    const um=Math.hypot(ux,uz)||1; ux/=um; uz/=um;
    const dist=speed*dt;
    ball.x+=ux*dist; ball.z+=uz*dist;
    ball.heading=Math.atan2(ux,uz);
    const axis=_v.set(uz,0,-ux).normalize();
    _q.setFromAxisAngle(axis, dist/ball.r);
    blueBall.quaternion.premultiply(_q);
  }
  const lim=ROOM_HALF-1-ball.r;
  ball.x=clamp(ball.x,-lim,lim); ball.z=clamp(ball.z,-lim,lim);
  blueBall.position.set(ball.x, ball.r, ball.z);
  // 물건 흡수
  for(let i=loose.length-1;i>=0;i--){ const it=loose[i];
    const d=Math.hypot(it.x-ball.x,it.z-ball.z);
    const reach=ball.r+it.size*0.8+0.1;
    if(d<reach){ if(it.size<=ball.r*PICK_RATIO) roomSwallow(it);
      else { const nx=(ball.x-it.x)/(d||1), nz=(ball.z-it.z)/(d||1); ball.x=it.x+nx*reach; ball.z=it.z+nz*reach; } }
  }
  // 구멍 상호작용
  for(let i=holes.length-1;i>=0;i--){ const h=holes[i];
    const d=Math.hypot(h.x-ball.x, h.z-ball.z);
    if(ball.r >= h.r){ if(d < ball.r + h.r*0.15) clearHole(h,i); }    // 내가 크면 덮어 제거
    else { if(d < h.r - ball.r*0.5){ fallIn(h); return; } }            // 내가 작으면 빠짐
  }
}

const PROPS = [
  { make:buildCandy, w:7 }, { make:buildDie, w:5 }, { make:buildFlower, w:8 },
  { make:buildMushroom, w:5 }, { make:buildApple, w:7 }, { make:buildOrange, w:6 },

  { make:buildChair, w:5 }, { make:buildLamp, w:4 }, { make:buildTree, w:6 },
  { make:buildCar, w:5 }, { make:buildHouse, w:3 },
];

const SMALL_MAKERS = [buildCandy,buildDie,buildFlower,buildMushroom,buildApple,buildOrange,
  buildMug,buildFork,buildSushi,buildToast,buildPudding,buildCone];

function addProp(grp, x, z, sc){
  sc = sc || 1;
  if(!grp.userData.hasShadow){ addShadow(grp, Math.max(0.18, grp.userData.size*0.92)); }
  if(sc!==1) grp.scale.setScalar(sc);
  grp.position.set(x, grp.userData.y*sc, z);
  grp.rotation.y = Math.random()*Math.PI*2;
  scene.add(grp);
  const psize=grp.userData.size*sc;
  if(typeof regOccupy==='function') regOccupy(x, z, psize*0.85);   // 물건 점유 등록(구멍이 피해 배치)
  loose.push({ grp, x, z, y:grp.userData.y*sc, size:psize });
}

function populate(){
  // 1) 중앙 밀집: 작은 물건 다수 (초반 흡수 쾌감)
  for(let i=0;i<90;i++){
    const make = SMALL_MAKERS[(Math.random()*SMALL_MAKERS.length)|0];
    const ang=Math.random()*Math.PI*2, dist=2.2+Math.random()*16;
    addProp(make(), Math.cos(ang)*dist, Math.sin(ang)*dist);
  }
  // 2) 전체 분포: 크기 가중치 (큰 건 바깥)
  const total = 200;
  const wsum = PROPS.reduce((a,p)=>a+p.w,0);
  for(let i=0;i<total;i++){
    let r = Math.random()*wsum, def;
    for(const p of PROPS){ if((r-=p.w)<=0){ def=p; break; } }
    const grp = def.make();
    const size = grp.userData.size;
    const ringMin = Math.min(GROUND-6, 3 + size*7);
    const ang = Math.random()*Math.PI*2;
    const dist = ringMin + Math.random()*(GROUND-6-ringMin);
    let x = Math.cos(ang)*dist, z = Math.sin(ang)*dist;
    if(Math.hypot(x,z) < 2.5){ x+=3; z+=3; }
    addProp(grp, x, z);
  }
}

function collectMats(grp){ const ms=[]; grp.traverse(function(o){ if(o.material){ if(Array.isArray(o.material)) ms.push.apply(ms,o.material); else ms.push(o.material); } }); return ms; }
function regBig(grp,x,z,size){ bigObjs.push({ grp, h:size, mats:collectMats(grp), op:1 }); }
// 큰 물체가 카메라와 볼 사이를 가리면 투명하게(시야 확보)
function updateOcclusion(dt){
  if(!bigObjs.length) return;
  const cx=camera.position.x, cz=camera.position.z, tx=ball.x, tz=ball.z;
  const vx=tx-cx, vz=tz-cz, L2=(vx*vx+vz*vz)||1;
  for(const b of bigObjs){
    const ox=b.grp.position.x, oz=b.grp.position.z;
    const t=((ox-cx)*vx+(oz-cz)*vz)/L2;
    let occ=false;
    if(t>0.04 && t<0.99){ const px=cx+vx*t, pz=cz+vz*t; if(Math.hypot(ox-px,oz-pz) < b.h*0.8+ball.r+0.4) occ=true; }
    const target=occ?0.22:1;
    b.op += (target-b.op)*Math.min(1,dt*12);
    for(const m of b.mats){ m.transparent=true; m.opacity=b.op; m.depthWrite=(b.op>0.9); }
  }
}

/* 맵(파란 볼)/일반 롤 공통 성장 반영 */
function refreshActive(){ if(MAP>0) refreshBlue(); else refreshBall(); }

/* --- 납작(squash) → 펑 연출 --- */
function addFlat(grp,x,z,sc){
  sc = sc || 1;
  if(!grp.userData.hasShadow) addShadow(grp, Math.max(0.2, grp.userData.size*0.9));
  if(sc!==1) grp.scale.setScalar(sc);
  grp.position.set(x, grp.userData.y*sc, z); grp.rotation.y=Math.random()*Math.PI*2; scene.add(grp);
  const fsize=grp.userData.size*sc;
  regOccupy(x, z, fsize*0.8);   // 물건 점유 등록(구멍이 물건 피해 배치)
  if(fsize>=1.5) regBig(grp, x, z, fsize);   // 큰 물체 → 가림 시 투명
  loose.push({ grp, x, z, y:grp.userData.y*sc, size:fsize, kind:'flat' });
}
function squash(grp,x,z,size,growK){
  splats.push({ grp, t:0, dur:0.30 });
  // 일반 물체 깔아뭉개기 → 아주 조금만 증가(싱크홀 제거가 주 성장원)
  ball.vol += Math.pow(size,3)*ABSORB*(growK==null?0.0225:growK);
  ball.score++; refreshActive(); SFX.squash(); updateHUD();
}
/* 맵: 작은 물건은 파란 볼 밑으로 빨려들어 사라지며 성장(붙지 않음) */
function mapSwallow(item){
  loose.splice(loose.indexOf(item),1);
  falling.push({ grp:item.grp, x0:item.x, z0:item.z, y0:(item.y||0.15)+0.1, t:0, dur:0.4,
    spin:rand(4,9), tilt:rand(3,7), toY:Math.max(0.3,ball.r*0.5) });
  // 빨아들이기 성장 — 눈 모드는 눈더미를 묻혀 크게 성장, 그 외 아주 조금
  ball.vol += Math.pow(item.size,3)*ABSORB*(SNOW?0.5:0.045); ball.score++;
  refreshBlue(); SFX.pop(ball.score); updateHUD();
  if(SNOW && ball.r>=snowTarget){} // (목표는 updateSnow의 받침 도달로 처리)
}
function updateSplats(dt){
  for(let i=splats.length-1;i>=0;i--){ const s=splats[i]; s.t+=dt; const t=Math.min(1,s.t/s.dur);
    s.grp.scale.y=Math.max(0.06,1-0.95*t); const sp=1+0.55*t; s.grp.scale.x=sp; s.grp.scale.z=sp;
    if(t>=1){ spawnPuff(s.grp.position.x,s.grp.position.z); scene.remove(s.grp); splats.splice(i,1); } }
}

/* --- 몬스터 이동/충돌 --- */
const MONSTER_BUILD={ant:buildAnt,rat:buildRat,cat:buildCat,ghost:buildGhost,pumpkin:buildPumpkin,zombie:buildZombie,person:buildPerson,skeleton:buildSkeleton,goblin:buildGoblin,reaper:buildReaper};
function spawnMonster(kind,x,z,fromHole){
  if(monsters.length>=MONSTER_CAP) return null;
  const grp=(MONSTER_BUILD[kind]||buildAnt)(); const size=grp.userData.size; const baseY=grp.userData.y||0;
  grp.position.set(x, fromHole? -size*1.8 : baseY, z); grp.rotation.y=Math.random()*Math.PI*2; scene.add(grp);
  if(fromHole) spawnPuff(x,z);   // 솟아날 때 흙먼지
  const m={ grp, x, z, size, kind, baseY, dir:Math.random()*Math.PI*2, speed:rand(1.2,2.6)*(MAP===1?0.5:1), turn:rand(0.6,1.6), bob:Math.random()*6.28, climb: fromHole?1:0, atkCd:rand(0.5,1.5) };
  monsters.push(m); return m;
}
const AGGRO=6;   // 이 거리 안이면 플레이어를 향해 다가옴(멀리선 안 옴)
function monDmg(kind){ return Math.round((kind==='reaper'?14: kind==='zombie'?10: kind==='goblin'?9: kind==='cat'?7: kind==='person'?5:6)*0.7); }   // 공격 30%↓
function updateMonsters(dt){
  const bound=MAP_BOUND-0.5;
  for(let i=monsters.length-1;i>=0;i--){ const m=monsters[i];
    if(m.atkCd>0) m.atkCd-=dt;
    // 구멍에서 솟아오르는 중 — 그 자리서 버둥대며 이징 상승, 구멍 통과하듯 짜부→펴짐
    if(m.climb>0){
      m.climb=Math.max(0,m.climb-dt/0.75);
      const cl=m.climb, ey=1-cl*cl; m.bob+=dt*14;
      const wob=Math.sin(m.bob)*0.18*cl;
      m.grp.position.set(m.x+wob, m.baseY - m.size*1.7*(1-ey), m.z);
      m.grp.rotation.y=m.dir + wob*0.8;
      m.grp.scale.set(1+0.32*cl, 1-0.42*cl, 1+0.32*cl);
      if(m.climb<=0) m.grp.scale.set(1,1,1);
      continue;
    }
    const toB=Math.hypot(ball.x-m.x, ball.z-m.z);
    if(toB<AGGRO){ // 반경 안 → 추격
      m.chasing=true;
      m.dir = Math.atan2(ball.x-m.x, ball.z-m.z) + (Math.random()-0.5)*0.4;
    } else { // 멀어지면 추격 포기(직전 추격 방향 버리고 배회)
      if(m.chasing){ m.chasing=false; m.dir=Math.random()*Math.PI*2; }
      m.dir += (Math.random()-0.5)*m.turn*dt;
    }
    const sp = m.speed*(toB<AGGRO?1.35:1);
    let nx=m.x+Math.sin(m.dir)*sp*dt, nz=m.z+Math.cos(m.dir)*sp*dt;
    if(nx<-bound||nx>bound){ m.dir=-m.dir; nx=clamp(nx,-bound,bound); }
    if(nz<-bound||nz>bound){ m.dir=Math.PI-m.dir; nz=clamp(nz,-bound,bound); }
    m.x=nx; m.z=nz; m.bob+=dt*9;
    const floatY=(m.kind==='ghost')? 0.5+Math.sin(m.bob)*0.2 : Math.abs(Math.sin(m.bob))*0.07;
    m.grp.position.set(nx, m.baseY+floatY, nz); m.grp.rotation.y=m.dir;
    const d=Math.hypot(m.x-ball.x,m.z-ball.z), reach=ball.r+m.size*0.7+0.05;
    if(m.climb<=0){
      if(d<reach && ball.r>=m.size*FLATTEN_RATIO){ monsters.splice(i,1); squash(m.grp,m.x,m.z,m.size,0.5); SFX.scream(); continue; } // 깔아뭉갬 → 으악!
      if(atkWindow && d<reach+0.6 && m.atkCd<=0){ damage(monDmg(m.kind), m.x, m.z); m.atkCd=1.5; } // 공격(공격 페이즈에만)
    }
  }
}

/* --- 배치 점유(구멍·큰 물체) — 서로 안 겹치게 --- */
const HSCALE = 0.5;   // 시작 볼 50%↓에 맞춰 구멍 크기 축소
let placed=[];        // {x,z,r} 이번 라운드 점유 원
function regOccupy(x,z,r){ placed.push({x,z,r}); }
function freeSpotNear(x,z,r,gap){
  gap=gap==null?0.5:gap;
  const hit=(px,pz)=>{ for(const p of placed){ if(Math.hypot(px-p.x,pz-p.z) < p.r+r+gap) return true; } return false; };
  if(hit(x,z)){
    const B=(MAP_BOUND||GROUND-2)-1;
    for(let t=0;t<40;t++){ const nx=rand(-B,B), nz=rand(-B,B); if(!hit(nx,nz)){ x=nx; z=nz; break; } }
  }
  regOccupy(x,z,r); return [x,z];
}
/* --- 바닥 구멍: 작으면 덮어 메우고(메꾸기), 나보다 크면 빠진다(실패). kind 있으면 몬스터 생성 --- */
function addSpawner(x,z,r,kind,interval,mega){
  r = mega ? r : Math.max(0.3, Math.min(r*HSCALE, 0.68));   // 너무 작은 구멍 키움(최소 0.3) / 메가는 그대로
  const sp=freeSpotNear(x,z,r);  x=sp[0]; z=sp[1];   // 다른 구멍·큰 물체와 안 겹치게
  const grp=buildHoleMesh(r); grp.position.set(x,0,z); scene.add(grp);
  spawners.push({ grp,x,z,r,kind,interval:interval||0, t:Math.random()*(interval||1), alive:true, mega:!!mega });
}
function fallInRoll(s){
  if(ended) return;
  ballSink={ x:s.x, z:s.z, t:0 };
  finish(false, '큰 구멍에 빠졌다…');
}
function updateSpawners(dt){
  for(let i=spawners.length-1;i>=0;i--){ const s=spawners[i];
    const d=Math.hypot(s.x-ball.x,s.z-ball.z);
    const canFill = ball.r >= s.r*0.8;
    setHoleColor(s.grp, !canFill);   // 메울 수 있으면 보라, 빠지는 구멍이면 검정
    if(canFill){
      // 내가 더 크다 → 덮어서 메움 (크게 성장!)
      if(d < ball.r*0.85){
        spawnPuff(s.x,s.z); spawnPuff(s.x,s.z); scene.remove(s.grp); spawners.splice(i,1);
        // 구멍 크기별 성장: 작은 구멍은 아주 조금(현재의 ~25%), 큰 구멍은 좀 더(현재의 50%)
        if(s.mega){ ball.vol += (1+ball.vol)*0.6 + 3; }   // 메가 구멍 — 볼이 크게 부풀어 침대까지 뭉갬
        else { const gmul = clamp(0.45 + (s.r-0.4)/0.5*0.3, 0.45, 0.75); ball.vol += (0.8 + s.r*s.r*s.r)*1.08*gmul; }   // 작은 구멍 적게·큰 구멍 더(1.2배)
        ball.score++; refreshActive(); SFX.loot(); updateHUD();
        if(MAP>0 && spawners.length===0 && !ended) finish(true);   // 맵: 모든 구멍 제거 → 클리어(눈사람 모드는 제외)
        continue;
      }
    } else {
      // 구멍이 나보다 크다 → 중심에 깊이 들어가면 빠진다(실패)
      if(d < s.r - ball.r*0.45){ fallInRoll(s); return; }
    }
    if(s.kind){ s.t+=dt; if(s.t>=s.interval){ s.t=0; if(monsters.length<MONSTER_CAP) spawnMonster(s.kind, s.x+rand(-0.5,0.5), s.z+rand(-0.5,0.5), true); } }
  }
}

function setMapLighting(theme){
  const L=LIGHTING[theme]||LIGHTING.default;
  renderer.setClearColor(L.clear,1);
  if(scene.fog){ scene.fog.color.setHex(L.fog); scene.fog.near=L.fogN; scene.fog.far=L.fogF; }
  sun.color.setHex(L.sunC); sun.intensity=L.sunI; sunOff=L.sunP.slice();
  hemiL.color.setHex(L.hemiS); hemiL.groundColor.setHex(L.hemiG); hemiL.intensity=L.hemiI;
  ambL.intensity=L.amb; fillL.intensity=L.fillI; rimL.intensity=L.rimI;
  if(mapLightGroup) scene.remove(mapLightGroup);
  mapLightGroup=new THREE.Group(); scene.add(mapLightGroup); mapLights=[];
  (L.pts||[]).forEach(p=>{ const pl=new THREE.PointLight(p[0],p[1],p[2]); pl.position.set(p[3],p[4],p[5]); mapLightGroup.add(pl); mapLights.push({light:pl,base:p[1],flick:p[6]||0}); });
}
function updateMapLights(){
  if(!mapLights.length) return; const tt=performance.now();
  for(const m of mapLights){ if(m.flick>0) m.light.intensity = m.base*(1 - m.flick*0.5 + m.flick*(0.5+0.5*Math.sin(tt*0.01*(1+m.base))) + (Math.random()-0.5)*m.flick*0.3); }
}

function damage(amt, x, z){
  if(ended || ball.hp<=0) return;
  ball.hp = Math.max(0, ball.hp - amt);
  hurtT = 0.6;                        // 피격 표시(HUD가 읽음 — 게이지 번쩍+윽 표정)
  SFX.hurt();                         // 윽! 비명
  if(x!=null){ const ux=(ball.x-x)/(Math.hypot(ball.x-x,ball.z-z)||1), uz=(ball.z-z)/(Math.hypot(ball.x-x,ball.z-z)||1);
    ball.x=clamp(ball.x+ux*0.6,-MAP_BOUND,MAP_BOUND); ball.z=clamp(ball.z+uz*0.6,-MAP_BOUND,MAP_BOUND); } // 넉백
  spawnPuff(ball.x,ball.z);
  updateHUD();
  if(ball.hp<=0 && !ended) finish(false, '체력이 다 됐다…');
}

function updateChopper(dt){

  chopper.rotation.y = -chopperT + Math.PI/2;
  if(chopper.userData.rotor) chopper.userData.rotor.rotation.y += dt*30;
  if(chopper.userData.trotor) chopper.userData.trotor.rotation.x += dt*30;

function updateBombs(dt){
  for(let i=bombs.length-1;i>=0;i--){ const b=bombs[i];
    b.vy += 14*dt; b.y -= b.vy*dt; b.grp.position.y=b.y; b.grp.rotation.x+=dt*4;
    if(b.mk){ b.mk.material.opacity = 0.4+0.4*Math.abs(Math.sin(performance.now()*0.012)); }
    if(b.y<=0.2){
      for(let k=0;k<6;k++) spawnPuff(b.tx+rand(-1,1), b.tz+rand(-1,1));
      SFX.boom();
      const d=Math.hypot(ball.x-b.tx, ball.z-b.tz);
      if(d < 2.4) damage(20, b.tx, b.tz);   // 폭발 반경
      scene.remove(b.grp); scene.remove(b.mk); bombs.splice(i,1);

function addTrafficCar(ang){
  const grp=buildCar(); const lim=MAP_BOUND+5;
  const car={ grp, ang, speed:rand(5,8), size:1.3, cd:0, x:-Math.sin(ang)*lim, z:-Math.cos(ang)*lim };
  grp.position.set(car.x,0,car.z); scene.add(grp); traffic.push(car);
}
function updateDevices(dt){
  ballSlow=1;
  for(const c of conveyors){ c.t+=dt;
    if(Math.abs(ball.x-c.x)<c.w/2 && Math.abs(ball.z-c.z)<c.d/2){ ball.x+=Math.sin(c.ang)*c.force*dt; ball.z+=Math.cos(c.ang)*c.force*dt; }
    c.arrows.forEach((a,i)=>{ const off=((c.t*c.force*0.3 + i/5)%1 - 0.5)*c.d; a.position.set(c.x+Math.sin(c.ang)*off, 0.05, c.z+Math.cos(c.ang)*off); a.rotation.z=-c.ang; });
  }
  for(const p of boostPads){ if(Math.hypot(ball.x-p.x,ball.z-p.z)<p.r){ boostT=0.45; boostVec={x:Math.sin(p.ang)*p.power,z:Math.cos(p.ang)*p.power}; SFX.grow(); } }
  if(boostT>0){ boostT-=dt; ball.x+=boostVec.x*dt; ball.z+=boostVec.z*dt; }
  for(const z of curseZones){ z.t+=dt; if(z.disc) z.disc.material.opacity=0.3+0.2*Math.abs(Math.sin(z.t*2));
    if(Math.hypot(ball.x-z.x,ball.z-z.z)<z.r){ ballSlow=0.45; z.cd-=dt; if(z.cd<=0){ z.cd=0.7; damage(4,z.x,z.z); } } }
  for(const car of traffic){ if(car.cd>0) car.cd-=dt;
    car.x+=Math.sin(car.ang)*car.speed*dt; car.z+=Math.cos(car.ang)*car.speed*dt;
    const lim=MAP_BOUND+6; if(Math.abs(car.x)>lim || Math.abs(car.z)>lim){ car.x=-Math.sin(car.ang)*lim; car.z=-Math.cos(car.ang)*lim; }
    car.grp.position.set(car.x,0,car.z); car.grp.rotation.y=car.ang;
    if(car.cd<=0 && Math.hypot(car.x-ball.x,car.z-ball.z)<ball.r+car.size){ damage(12,car.x,car.z); car.cd=1.3; }
  }
  if(portalCd>0) portalCd-=dt;
  for(const pt of portals){ if(pt.ma){ pt.ma.rotation.z+=dt*2; pt.mb.rotation.z-=dt*2; }
    if(portalCd<=0){
      if(Math.hypot(ball.x-pt.ax,ball.z-pt.az)<pt.r){ ball.x=pt.bx; ball.z=pt.bz; portalCd=1.4; spawnPuff(pt.ax,pt.az); spawnPuff(pt.bx,pt.bz); }
      else if(Math.hypot(ball.x-pt.bx,ball.z-pt.bz)<pt.r){ ball.x=pt.ax; ball.z=pt.az; portalCd=1.4; spawnPuff(pt.ax,pt.az); spawnPuff(pt.bx,pt.bz); }
    } }
}

function updateMapExtras(dt){
  updateAtkPhase(dt);

  updateChopper(dt); updateBombs(dt);

    const M=windowGhost.userData.mats; M[0].opacity=o; M[1].opacity=o; windowGhost.position.x=Math.sin(ambT*0.4)*1.1; }
}

function updateBallSnow(dt){
  if(snowAssemble) return;
  const inp=inputVector(); let ddx=0,ddz=0;
  if(inp.m>0.01){ const Fx=Math.sin(camYaw),Fz=Math.cos(camYaw),Rx=Math.cos(camYaw),Rz=-Math.sin(camYaw);
    let ux=Fx*(-inp.y)-Rx*inp.x, uz=Fz*(-inp.y)-Rz*inp.x; const um=Math.hypot(ux,uz)||1; ddx=ux/um; ddz=uz/um; }
  let onIce=false; for(const p of icePatches){ if(Math.hypot(ball.x-p.x,ball.z-p.z)<p.r){ onIce=true; break; } }
  const maxSpd=(8.6+ball.r*1.8)*(onIce?1.3:1), accel=(onIce?1.1:8.5)*maxSpd, f=Math.pow(onIce?0.995:0.78, dt*60);   // 더 빠름 + 얼음 위 더 미끄럽게
  snowVel.x+=ddx*inp.m*accel*dt; snowVel.z+=ddz*inp.m*accel*dt;
  snowVel.x*=f; snowVel.z*=f;
  const sp=Math.hypot(snowVel.x,snowVel.z); if(sp>maxSpd){ snowVel.x*=maxSpd/sp; snowVel.z*=maxSpd/sp; }
  ball.x+=snowVel.x*dt; ball.z+=snowVel.z*dt;
  const dist=Math.hypot(snowVel.x,snowVel.z)*dt;
  if(dist>1e-4){ ball.heading=Math.atan2(snowVel.x,snowVel.z); const axis=_v.set(snowVel.z,0,-snowVel.x).normalize(); _q.setFromAxisAngle(axis,dist/ball.r); blueBall.quaternion.premultiply(_q); }
  const lim=MAP_BOUND; ball.x=clamp(ball.x,-lim,lim); ball.z=clamp(ball.z,-lim,lim);
  blueBall.position.set(ball.x, ball.r, ball.z);
}
function updateSnow(dt){
  updateAtkPhase(dt);
  const bound=MAP_BOUND-0.5;
  for(let i=snowMovers.length-1;i>=0;i--){ const m=snowMovers[i];
    if(m.meleeCd>0) m.meleeCd-=dt; if(m.throwCd>0) m.throwCd-=dt;
    // 얼음 구멍에서 솟아오르는 중 — 그 자리서 버둥대며 이징 상승
    if(m.climb>0){
      m.climb=Math.max(0,m.climb-dt/0.75);
      const cl=m.climb; m.bob+=dt*14;
      const wob=Math.sin(m.bob)*0.18*cl;
      m.grp.position.set(m.x+wob, -(m.size*1.7)*cl*cl, m.z);   // ease-out 상승
      m.grp.rotation.y=m.dir+wob*0.8;
      m.grp.scale.set(1+0.32*cl,1-0.42*cl,1+0.32*cl);
      if(m.climb<=0) m.grp.scale.set(1,1,1);
      continue;
    }
    const toB=Math.hypot(ball.x-m.x,ball.z-m.z);
    if(toB<10) m.dir=Math.atan2(ball.x-m.x,ball.z-m.z)+(Math.random()-0.5)*0.5;
    else m.dir+=(Math.random()-0.5)*1.2*dt;
    const spd=m.speed*(toB<10?1.2:1);
    let nx=m.x+Math.sin(m.dir)*spd*dt, nz=m.z+Math.cos(m.dir)*spd*dt;
    if(nx<-bound||nx>bound){ m.dir=-m.dir; nx=clamp(nx,-bound,bound); }
    if(nz<-bound||nz>bound){ m.dir=Math.PI-m.dir; nz=clamp(nz,-bound,bound); }
    m.x=nx; m.z=nz; m.bob+=dt*8;
    m.grp.position.set(nx,Math.abs(Math.sin(m.bob))*0.06,nz); m.grp.rotation.y=m.dir;
    const d=Math.hypot(nx-ball.x,nz-ball.z), reach=ball.r+m.size*0.7+0.05;
    if(!snowAssemble && d<reach && ball.r>=m.size*1.05){   // 충분히 크면 흡수
      snowMovers.splice(i,1);
      falling.push({ grp:m.grp, x0:nx, z0:nz, y0:0.2, t:0, dur:0.4, spin:rand(4,9), tilt:rand(3,7), toY:Math.max(0.3,ball.r*0.5) });
      ball.vol+=Math.pow(m.size,3)*ABSORB*0.5; ball.score++; refreshBlue(); SFX.pop(ball.score); updateHUD(); continue;
    }
    if(!snowAssemble && atkWindow && d<reach+0.5 && m.meleeCd<=0){ damage(snowEnemyDmg(m.kind), nx, nz); m.meleeCd=1.6; }   // 근접 공격(공격 페이즈에만)
  }
  // 눈 던지기: 15초마다, 동시에 최대 2마리만
  if(!snowAssemble){ snowThrowT-=dt; if(snowThrowT<=0){ snowThrowT=15; snowVolley(); } }
  for(const h of iceHoles){ h.t+=dt; if(h.t>=h.interval){ h.t=0; spawnSnowEnemy('penguin', h.x+rand(-0.5,0.5), h.z+rand(-0.5,0.5), true); } }
  // 메우기/빠지기 구멍(작은=메움·성장, 큰=빠지면 실패) — 조립 중엔 정지
  if(!snowAssemble) updateSpawners(dt);

  if(hurtT>0) hurtT=Math.max(0,hurtT-dt);
  if(snowBase){ const b=snowBase.userData;
    snowBase.userData.ringT=(snowBase.userData.ringT||0)+dt;
    if(b.ring) b.ring.material.opacity = ball.r>=snowTarget ? (0.35+0.4*Math.abs(Math.sin(snowBase.userData.ringT*4))) : 0.3;
    if(!snowAssemble && !ended && ball.r>=snowTarget){ const d=Math.hypot(ball.x-b.x,ball.z-b.z); if(d<b.r+ball.r) snowAssemble={ t:0, built:false }; }
  }
  if(snowAssemble) updateAssemble(dt);
}

    snowAssemble.show=0;   // 정면 카메라 쇼케이스 5초
  }
  // 완성된 눈사람을 정면에서 5초 비춰주고 클리어
  if(snowAssemble.built){
    snowAssemble.show=(snowAssemble.show||0)+dt;
    const headY=b.r*2 + ball.r*0.85;
    const look=_v.set(b.x, headY*0.7, b.z);
    const orb=snowAssemble.show*0.5;                       // 천천히 도는 정면 시점
    camera.position.set(b.x+Math.sin(orb)*6.5, headY*0.7+3.2, b.z+Math.cos(orb)*6.5 + 4.5);
    camera.lookAt(look);

// 똥 볼: 작은 똥 흡수(성장) / 더 큰 똥 충돌 시 게임오버
function updateDung(dt){
  if(dungWin){ updateDungCrush(dt); return; }
  updateDungVisuals(dt);
  const r=ball.r;
  for(let i=dungPiles.length-1;i>=0;i--){ const p=dungPiles[i];
    setDungColor(p, r < p.size*0.9);   // 나보다 크면 붉은 똥색
    const d=Math.hypot(p.x-ball.x, p.z-ball.z);
    if(d < r + p.size){
      if(r >= p.size*0.9){   // 나보다 작은 똥 → 흡수
        dungPiles.splice(i,1);
        falling.push({ grp:p.grp, x0:p.x, z0:p.z, y0:0.2, t:0, dur:0.4, spin:rand(4,9), tilt:rand(3,7), toY:Math.max(0.3,r*0.5) });
        ball.vol += Math.pow(p.size,3)*ABSORB*0.5; ball.score++; refreshBall(); SFX.pop(ball.score); updateHUD();
        if(ball.r>=goalR() && !ended && !dungWin) dungWin={t:0};   // 충분히 거대 → 산/도시 흡수 연출
      } else if(d < r + p.size*0.5 && !ended){   // 더 큰 똥 중심에 충돌 → 게임오버
        finish(false, '나보다 큰 똥에 부딪혔다! 💩'); return;
      }
    }
  }
}
function updateDungCrush(dt){   // 산/도시를 굴려 뭉개는 클리어 연출
  moveVec={x:0,y:0};
  dungWin.t+=dt; const t=Math.min(1,dungWin.t/1.8);
  if(dungScape){ dungScape.scale.set(1-t*0.92, Math.max(0.04,1-t), 1-t*0.92); dungScape.position.y=-t*7; }
  for(let k=0;k<2;k++){ if(Math.random()<0.6){ const a=Math.random()*6.28, d=rand(16,40); spawnPuff(Math.cos(a)*d, Math.sin(a)*d); } }
  if(t>=1 && !ended) finish(true, DUNG===2?'도시를 통째로 뭉갰다! 🏙️':'산까지 굴려 뭉갰다! ⛰️');
}
function updateSprouts(dt){
  if(dungWin){ updateDungCrush(dt); return; }
  const bound=GROUND-3;
  for(let i=sprouts.length-1;i>=0;i--){ const m=sprouts[i];
    const dx=m.x-ball.x, dz=m.z-ball.z, d=Math.hypot(dx,dz);
    if(d<7){ m.dir=Math.atan2(dx,dz)+(Math.random()-0.5)*0.4; }   // 공에서 도망(반대 방향)
    else m.dir+=(Math.random()-0.5)*1.5*dt;
    const spd=m.speed*(d<7?1.25:0.5);
    let nx=m.x+Math.sin(m.dir)*spd*dt, nz=m.z+Math.cos(m.dir)*spd*dt;
    if(nx<-bound||nx>bound){ m.dir=-m.dir; nx=clamp(nx,-bound,bound); }
    if(nz<-bound||nz>bound){ m.dir=Math.PI-m.dir; nz=clamp(nz,-bound,bound); }
    m.x=nx; m.z=nz; m.bob+=dt*12;
    m.grp.position.set(nx, Math.abs(Math.sin(m.bob))*0.12, nz); m.grp.rotation.y=m.dir;
    // 공이 충분히 크면 휘말려 흡수(성장)
    const reach=ball.r+m.size*0.7+0.1;
    if(d<reach && ball.r>=m.size*0.9){
      sprouts.splice(i,1);
      falling.push({ grp:m.grp, x0:nx, z0:nz, y0:0.2, t:0, dur:0.4, spin:rand(5,10), tilt:rand(3,7), toY:Math.max(0.3,ball.r*0.5) });
      ball.vol += Math.pow(m.size,3)*ABSORB*0.5; ball.score++; refreshBall(); SFX.pop(ball.score); updateHUD();
      if(ball.r>=goalR() && !ended && !dungWin) dungWin={t:0};   // 클리어 연출 시작
    }
  }
}

/* ===================== 입력 (조이스틱 + 키보드) ===================== */
const stickEl = document.getElementById('stick'), knobEl = document.getElementById('stickKnob');
let touchActive=false, touchId=null, originX=0, originY=0, moveVec={x:0,y:0};
const keys = {};

function startStick(px,py){
  touchActive=true; originX=px; originY=py; moveVec={x:0,y:0};
  stickEl.style.display='block';
  stickEl.style.left=(px-60)+'px'; stickEl.style.top=(py-60)+'px';
  knobEl.style.transform='translate(-50%,-50%)';
}
function moveStick(px,py){
  if(!touchActive) return;
  let dx=px-originX, dy=py-originY; const mag=Math.hypot(dx,dy), max=46;
  if(mag>max){ dx=dx/mag*max; dy=dy/mag*max; }
  knobEl.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  const m=Math.hypot(dx,dy); moveVec = m>6 ? {x:dx/max, y:dy/max} : {x:0,y:0};
}
function endStick(){ touchActive=false; touchId=null; moveVec={x:0,y:0}; stickEl.style.display='none'; }

cv.addEventListener('touchstart', e=>{ if(!running) return; e.preventDefault();
  const t=e.changedTouches[0]; touchId=t.identifier; const r=cv.getBoundingClientRect();
  startStick(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
cv.addEventListener('touchmove', e=>{ if(!touchActive) return; e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===touchId){ const r=cv.getBoundingClientRect();
    moveStick(t.clientX-r.left, t.clientY-r.top); } } }, {passive:false});
cv.addEventListener('touchend', e=>{ for(const t of e.changedTouches){ if(t.identifier===touchId) endStick(); } });
cv.addEventListener('touchcancel', endStick);
// 마우스(데스크톱 테스트)
cv.addEventListener('mousedown', e=>{ if(!running) return; const r=cv.getBoundingClientRect(); startStick(e.clientX-r.left,e.clientY-r.top); });
addEventListener('mousemove', e=>{ if(!touchActive) return; const r=cv.getBoundingClientRect(); moveStick(e.clientX-r.left,e.clientY-r.top); });
addEventListener('mouseup', endStick);
addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault(); });
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

function inputVector(){
  let x=moveVec.x, y=moveVec.y;
  if(gyroOn){ x+=gyroVec.x; y+=gyroVec.y; }
  if(keys['w']||keys['arrowup']) y-=1;
  if(keys['s']||keys['arrowdown']) y+=1;
  if(keys['a']||keys['arrowleft']) x-=1;
  if(keys['d']||keys['arrowright']) x+=1;
  const m=Math.hypot(x,y); if(m>1){ x/=m; y/=m; }
  return {x,y,m:Math.min(1,m)*sensitivity};   // 볼 민감도 반영
}

let toastTimer=null;
function showToast(msg, ms){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.classList.remove('hidden');
  if(toastTimer) clearTimeout(toastTimer);
  if(ms!==0) toastTimer=setTimeout(()=>t.classList.add('hidden'), ms||3600);
}
function hideToast(){ const t=document.getElementById('toast'); if(t) t.classList.add('hidden'); }
function applyOrient(e){
  if(e.beta==null || e.gamma==null) return;
  gyroSeen=true;
  if(!gyroBase){ gyroBase={beta:e.beta, gamma:e.gamma}; }
  let db=e.beta-gyroBase.beta, dg=e.gamma-gyroBase.gamma;
  if(Math.abs(db)<GYRO_DEAD) db=0; else db-=Math.sign(db)*GYRO_DEAD;
  if(Math.abs(dg)<GYRO_DEAD) dg=0; else dg-=Math.sign(dg)*GYRO_DEAD;
  // 화면 회전각 보정: 세로(0)·가로(90/270)·뒤집힘(180) 모두 자연스럽게
  const ang = (screen.orientation && typeof screen.orientation.angle==='number')
    ? screen.orientation.angle : (window.orientation||0);
  let x, y;
  switch(((ang%360)+360)%360){
    case 90:  x= db; y=-dg; break;
    case 180: x=-dg; y=-db; break;
    case 270: x=-db; y= dg; break;
    default:  x= dg; y= db; break;   // 0 (세로)
  }
  gyroVec.x = clamp(x*GYRO_SENS, -1, 1);
  gyroVec.y = clamp(y*GYRO_SENS, -1, 1);
}
// 상대 방위(deviceorientation)를 우선 사용하고, 그게 안 오는 기기만 absolute로 폴백
let gotRelative=false;
function onOrient(e){ gotRelative=true; applyOrient(e); }
function onOrientAbs(e){ if(gotRelative) return; applyOrient(e); }
function addOrientListeners(){
  gotRelative=false;
  window.addEventListener('deviceorientation', onOrient);
  window.addEventListener('deviceorientationabsolute', onOrientAbs);   // 일부 안드로이드 기기
}
function removeOrientListeners(){
  window.removeEventListener('deviceorientation', onOrient);
  window.removeEventListener('deviceorientationabsolute', onOrientAbs);
}
function startGyro(){
  gyroBase=null; gyroVec={x:0,y:0}; gyroSeen=false;
  const begin=()=>{
    addOrientListeners();
    gyroOn=true; setGyroBtn();
    showToast('기울기 ON · 평소 들던 자세로 잠깐 두면 중앙이 잡혀요', 2600);
    setTimeout(()=>{ if(gyroOn && !gyroSeen){
      showToast(IN_IFRAME
        ? '여기(미리보기 창)에선 센서가 막혀요. 아래 ↗ 버튼으로 새 탭에서 열면 작동해요!'
        : (!INSECURE
            ? '센서값이 안 들어와요. 크롬 ⋮ 메뉴 → 사이트 설정에서 "동작 센서" 허용을 확인해줘.'
            : '⚠️ 기울기 센서는 https(보안 연결)에서만 작동해요. https://applepang-cloud.github.io 주소로 열어줘!'), 0);
    } }, 1500);
  };
  // iOS 13+ 만 권한 요청 / 안드로이드 크롬은 보안컨텍스트(HTTPS 새 탭)에서 바로 동작
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(p=>{ if(p==='granted') begin();
      else { gyroOn=false; setGyroBtn(); showToast('기울기 센서 권한이 거부됐어요.'); } })
      .catch(()=>{ gyroOn=false; setGyroBtn(); showToast('권한 요청 실패 · ↗ 새 탭에서 다시 시도해줘.', 0); });
  } else { begin(); }
}
function stopGyro(){ removeOrientListeners(); gyroOn=false; gyroVec={x:0,y:0}; setGyroBtn(); hideToast(); }
function setGyroBtn(){ const b=document.getElementById('bGyro'); if(b) b.classList.toggle('off',!gyroOn); }

/* ===================== 흡수/성장 ===================== */
const _q = new THREE.Quaternion(), _v = new THREE.Vector3();
function collect(item){
  loose.splice(loose.indexOf(item),1);
  const grp = item.grp;
  // 접촉 방향(월드) → 공 로컬 방향
  _v.set(item.x-ball.x, (item.y||0.1)-ball.r, item.z-ball.z);
  if(_v.lengthSq()<1e-6) _v.set(rand(-1,1),0.4,rand(-1,1));
  _v.normalize();
  _q.copy(ballGroup.quaternion).invert();
  const localDir = _v.applyQuaternion(_q).normalize();
  scene.remove(grp);
  grp.position.copy(localDir).multiplyScalar(ball.r);
  grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), localDir);
  grp.rotateY(Math.random()*Math.PI*2);
  ballGroup.add(grp);
  stuck.push({ grp, dir:localDir.clone() });

  // 성장
  ball.vol += Math.pow(item.size, 3) * ABSORB;
  ball.score++;
  refreshBall();
  // 부착물 과다 시 오래된 것 제거(성능)
  if(stuck.length > MAX_STUCK){ const old=stuck.shift(); ballGroup.remove(old.grp); }

  SFX.pop(ball.score);
  spawnPuff(item.x, item.z);
  updateHUD();
  if(ball.r >= goalR() && !ended){ if(DUNG){ if(!dungWin) dungWin={t:0}; } else finish(true); }
}

/* ===================== 구멍 흡수/빨림 ===================== */
function swallow(item){
  loose.splice(loose.indexOf(item),1);
  const grp=item.grp;
  falling.push({ grp, x0:item.x, z0:item.z, y0:(item.y||0.15)+0.1, t:0, dur:0.45,
    spin:rand(4,9), tilt:rand(3,7) });
  ball.area += Math.PI*item.size*item.size*ABSORB_H;
  ball.score++;
  refreshHole();
  SFX.pop(ball.score);
  updateHUD();
  if(ball.r >= goalR() && !ended) finish(true);
}
function updateAbsorbHole(dt){
  const r=ball.r;
  for(let i=loose.length-1;i>=0;i--){
    const it=loose[i];
    const d=Math.hypot(it.x-ball.x, it.z-ball.z);
    if(d < r*0.95 && it.size <= r*HOLE_PICK) swallow(it);
  }
}
function updateFalling(dt){
  for(let i=falling.length-1;i>=0;i--){
    const f=falling[i]; f.t+=dt; const t=Math.min(1,f.t/f.dur);
    const e=t*t;
    const toY = (f.toY!=null)?f.toY:-2.4;
    f.grp.position.x = f.x0 + (ball.x-f.x0)*e;
    f.grp.position.z = f.z0 + (ball.z-f.z0)*e;
    f.grp.position.y = f.y0 + (toY-f.y0)*e;
    f.grp.scale.setScalar(Math.max(0.05, 1-0.85*t));
    f.grp.rotation.y += f.spin*dt; f.grp.rotation.x += f.tilt*dt;
    if(t>=1){ scene.remove(f.grp); falling.splice(i,1); }
  }
}

function updateAbsorb(dt){
  const r=ball.r;
  for(let i=loose.length-1;i>=0;i--){
    const it=loose[i];
    const d=Math.hypot(it.x-ball.x, it.z-ball.z);
    const reach = r + it.size*0.8 + 0.1;
    if(d < reach){
      if(it.kind==='flat'){
        // 가구/큰 사물 → 충분히 크면 납작(squash)→펑, 아니면 벽
        if(r >= it.size*FLATTEN_RATIO){ loose.splice(i,1); squash(it.grp,it.x,it.z,it.size,0.45); }
        else { const nx=(ball.x-it.x)/(d||1), nz=(ball.z-it.z)/(d||1); ball.x=it.x+nx*reach; ball.z=it.z+nz*reach; }
      } else if(it.size <= r*PICK_RATIO){ (MAP>0||SNOW) ? mapSwallow(it) : collect(it); }
      else {
        // 너무 큰 물건 → 벽처럼 밀어냄
        const nx=(ball.x-it.x)/(d||1), nz=(ball.z-it.z)/(d||1);
        ball.x = it.x + nx*reach; ball.z = it.z + nz*reach;
      }
    }
  }
}

/* 먼지 파티클 */
let puffs=[];
const PUFF_GEO=new THREE.SphereGeometry(0.12,5,4);
function spawnPuff(x,z){
  for(let i=0;i<5;i++){
    const m=new THREE.Mesh(PUFF_GEO, new THREE.MeshBasicMaterial({color:0xffffff, transparent:true}));
    m.position.set(x, 0.2, z); scene.add(m);
    puffs.push({ m, vx:rand(-1.4,1.4), vy:rand(1.2,2.6), vz:rand(-1.4,1.4), life:1 });
  }
}
function updatePuffs(dt){
  for(let i=puffs.length-1;i>=0;i--){ const p=puffs[i];
    p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt; p.vy-=4*dt;
    p.life-=dt*1.8; p.m.material.opacity=Math.max(0,p.life); p.m.scale.setScalar(1+ (1-p.life));
    if(p.life<=0){ scene.remove(p.m); puffs.splice(i,1); }
  }
}

/* ===================== 움직임 & 카메라 ===================== */
function updateBall(dt){
  if(SNOW){ updateBallSnow(dt); return; }
  const inp = inputVector();
  const speed = (6.2 + ball.r*1.6) * inp.m * (MAP>0?ballSlow:1);
  if(inp.m>0.01){
    const Fx=Math.sin(camYaw), Fz=Math.cos(camYaw);   // 화면 전방(지면)
    const Rx=Math.cos(camYaw), Rz=-Math.sin(camYaw);  // 화면 오른쪽
    let ux = Fx*(-inp.y) - Rx*inp.x;
    let uz = Fz*(-inp.y) - Rz*inp.x;
    const um = Math.hypot(ux,uz)||1; ux/=um; uz/=um;
    const dist = speed*dt;
    ball.x += ux*dist; ball.z += uz*dist;
    ball.heading = Math.atan2(ux, uz);
    const axis = _v.set(uz, 0, -ux).normalize();
    _q.setFromAxisAngle(axis, dist / ball.r);
    ((MAP>0||SNOW) ? blueBall : ballGroup).quaternion.premultiply(_q);
  }
  const lim=MAP_BOUND;
  ball.x=clamp(ball.x,-lim,lim); ball.z=clamp(ball.z,-lim,lim);
  ((MAP>0||SNOW) ? blueBall : ballGroup).position.set(ball.x, ball.r, ball.z);
}

function updateHole(dt){
  const inp = inputVector();
  const speed = (6.6 + ball.r*0.7) * inp.m;
  if(inp.m>0.01){
    // 월드 고정 8방향: 화면 위=+Z, 좌우 반전 적용
    let ux = -inp.x, uz = -inp.y;
    const um = Math.hypot(ux,uz)||1; ux/=um; uz/=um;
    ball.x += ux*speed*dt; ball.z += uz*speed*dt;
    ball.heading = Math.atan2(ux, uz);
  }
  const lim=GROUND-2;
  ball.x=clamp(ball.x,-lim,lim); ball.z=clamp(ball.z,-lim,lim);
  holeGroup.position.set(ball.x, 0, ball.z);
}

function updateCamera(dt){
  if(SNOW && snowAssemble && snowAssemble.built) return;   // 눈사람 쇼케이스 카메라 우선
  const moving = inputVector().m>0.01;
  // 굴리기: 진행방향 추종 / 구멍: 고정 카메라(8방향 일관성)
  if(MODE==='hole') camYaw = 0;
  else if(moving) camYaw += angDiff(camYaw, ball.heading)*Math.min(1,dt*3.0);
  let back, high, lookY;
  if(MODE==='hole'){ back = 4.0 + ball.r*2.0; high = 7.0 + ball.r*3.6; lookY = 0; }
  else { back = 5.5 + ball.r*3.2; high = 3.2 + ball.r*2.6; lookY = ball.r*0.6+0.4; }
  const Fx=Math.sin(camYaw), Fz=Math.cos(camYaw);
  const cx = ball.x - Fx*back;
  const cz = ball.z - Fz*back;
  const cy = high + (MODE==='hole'?0:ball.r);
  camera.position.x += (cx-camera.position.x)*Math.min(1,dt*4);
  camera.position.y += (cy-camera.position.y)*Math.min(1,dt*4);
  camera.position.z += (cz-camera.position.z)*Math.min(1,dt*4);
  camera.lookAt(ball.x, lookY, ball.z);
  // 실내 맵: 카메라가 벽 바깥에 있으면 그 벽을 투명하게(가려서 회색만 보이는 문제 해결)
  if(mapWalls.length){
    for(const w of mapWalls){
      const proj = w.nx*camera.position.x + w.nz*camera.position.z;   // 바깥방향 투영
      const out = proj > w.lim - 3.5;                                  // 벽 바깥(근접 포함)
      const target = out ? 0.12 : 1.0;
      w.mesh.material.opacity += (target - w.mesh.material.opacity)*Math.min(1,dt*10);
    }
  }

  if(MODE==='roll' && MAP===0 && !SNOW && prince){
    const pd = ball.r + 0.35;
    prince.position.set(ball.x - Math.sin(ball.heading)*pd, 0, ball.z - Math.cos(ball.heading)*pd);
    prince.rotation.y = ball.heading;
    prince.children.forEach((c,i)=>{ if(i>=6){ c.rotation.x = moving? Math.sin(performance.now()*0.012+i)*0.5 : 0; } });
    prince.position.y = moving? Math.abs(Math.sin(performance.now()*0.012))*0.08 : 0;
  }
}

/* ===================== 오디오 ===================== */
let actx=null, sfxGain=null, musGain=null, soundOn=true, musicOn=true, musTimer=null, musStep=0;
function initAudio(){
  if(actx){ if(actx.state==='suspended') actx.resume(); return; }
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  sfxGain=actx.createGain(); sfxGain.gain.value=0.32; sfxGain.connect(actx.destination);
  musGain=actx.createGain(); musGain.gain.value=0.32; musGain.connect(actx.destination);
  initAmbient();   // 배경음악은 mp3(setMusic)로 대체
}
// mp3 배경음악 (game/music/mapN.mp3) — 임베드/스탠드얼론 양쪽서 동일 경로 해석
const MUSIC_BASE = (location.pathname.indexOf('/game/')>=0) ? 'music/' : 'game/music/';
let bgm=null, bgmFile='';
function trackFor(){
  if(DUNG) return 'map5.mp3';                // 이벤트: 쇠똥구리(마을·도시)
  if(MAP>0) return 'map'+MAP+'.mp3';        // 스토리 맵 N → mapN.mp3
  if(SNOW) return 'map4.mp3';                // 이벤트: 눈사람
  if(MODE==='hole') return 'map3.mp3';       // 이벤트: 구멍 빨아들이기
  return 'map2.mp3';                          // 이벤트: 공 굴리기/방
}
function setMusic(file){
  if(!file) return;
  if(!bgm){ bgm=new Audio(); bgm.loop=true; bgm.volume=0.19; bgm.preload='auto'; }
  if(bgmFile!==file){ bgmFile=file; bgm.src=MUSIC_BASE+file; try{ bgm.load(); }catch(_){} }
  if(musicOn){ try{ bgm.currentTime=0; }catch(_){}  const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); } else { bgm.pause(); }
}
function tone(freq,dur,type,gain,slide){
  if(!actx||!soundOn) return; const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,slide),t+dur);
  g.gain.setValueAtTime(gain||0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
}
// 노이즈 버퍼(바람·폭발·휙 등)
let NOISE_BUF=null;
function makeNoise(){ const b=actx.createBuffer(1, (actx.sampleRate*2)|0, actx.sampleRate); const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return b; }
function noiseBurst(dur,type,freq,gain,slideTo,bus){ if(!actx||!soundOn) return; const t=actx.currentTime;
  if(!NOISE_BUF) NOISE_BUF=makeNoise();
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF;
  const f=actx.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.setValueAtTime(freq,t);
  if(slideTo) f.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t+dur);
  const g=actx.createGain(); g.gain.setValueAtTime(gain||0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(f); f.connect(g); g.connect(bus||sfxGain); src.start(t); src.stop(t+dur+0.05);
}
const SFX={
  pop(n){ const base=420+Math.min(40,n)*14; tone(base,0.08,'triangle',0.18,base*1.5);
    tone(base*1.5,0.06,'sine',0.1); },
  grow(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.2),i*60)); },
  win(){ [523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'triangle',0.22),i*90)); },
  lose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sawtooth',0.18,f*0.7),i*150)); },
  loot(){ tone(880,0.06,'triangle',0.16); setTimeout(()=>tone(1245,0.10,'triangle',0.16),60); },
  scream(){ const b=300+Math.random()*140; tone(b,0.2,'sawtooth',0.22,b*0.32); tone(b*1.9,0.12,'square',0.09,b*0.5); }, // 으악!
  hurt(){ tone(200,0.14,'square',0.2,90); tone(150,0.1,'sawtooth',0.12,70); }, // 윽! (주인공 피격)
  boom(){ noiseBurst(0.5,'lowpass',420,0.5,120); tone(90,0.4,'sine',0.3,38); }, // 폭발(공중 폭격)
  whoosh(){ noiseBurst(0.22,'highpass',500,0.16,2200); }, // 휙(눈 던지기)
  squash(){ tone(150,0.12,'square',0.18,60); noiseBurst(0.14,'lowpass',300,0.18); }, // 퍽(납작)
};
const MEL=[0,4,7,4, 9,7,4,0, 5,9,5,2, 7,4,7,11];
const BASS=[0,0,5,5, 7,7,2,2];
function nf(s){ return 196*Math.pow(2,s/12); }
function mnote(freq,type,dur,gain){ if(!actx) return; const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(gain,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(musGain);
  o.start(t); o.stop(t+dur+0.04); }
function startMusic(){ if(musTimer) clearInterval(musTimer);
  musTimer=setInterval(()=>{ if(!actx||!musicOn) return;
    mnote(nf(MEL[musStep%MEL.length]+12),'triangle',0.2,0.14);
    if(musStep%2===0) mnote(nf(BASS[(Math.floor(musStep/2))%BASS.length]-12),'sine',0.4,0.2);
    musStep++;
  }, 200); }

/* ===================== 환경 자연음(바람 + 맵별 앰비언스) ===================== */
let ambGain=null, windGain=null, windFilter=null, windSrc=null, ambTimer=null, ambTheme='';
function initAmbient(){
  if(ambGain) return;
  ambGain=actx.createGain(); ambGain.gain.value=0.6; ambGain.connect(actx.destination);
  windFilter=actx.createBiquadFilter(); windFilter.type='lowpass'; windFilter.frequency.value=440;
  windGain=actx.createGain(); windGain.gain.value=0; windFilter.connect(windGain); windGain.connect(ambGain);
  if(!NOISE_BUF) NOISE_BUF=makeNoise();
  windSrc=actx.createBufferSource(); windSrc.buffer=NOISE_BUF; windSrc.loop=true; windSrc.connect(windFilter); windSrc.start();
  ambTimer=setInterval(ambTick, 1100);
}
const WIND_LV={ yard:0.10, city:0.09, grave:0.20, snow:0.28, room:0.03, mart:0.04, school:0.04 };
function setAmbient(theme){
  ambTheme=theme||'';
  if(!actx||!windGain) return;
  const lv=(soundOn && running)? (WIND_LV[ambTheme]||0) : 0;
  windGain.gain.setTargetAtTime(lv, actx.currentTime, 0.6);
  windFilter.frequency.setTargetAtTime(ambTheme==='snow'?620:ambTheme==='grave'?320:440, actx.currentTime, 0.6);
}

  running=true; ended=false; timeLeft=roundTimeFor(); growMark=START_R;
  if(gyroOn) recenterGyro();
  initAudio(); setMapLighting('default'); setAmbient(mode==='room'?'room':'yard'); setMusic(trackFor()); updateModeUI(); updateHUD(); updateTime();
}
function finish(win, reason){
  ended=true; running=false; endStick(); setAmbient(''); countdown=0;
  if(bgm){ bgm.pause(); }   // 클리어/종료 시 배경음악 정지 → 클리어 사운드(SFX.win)
  { const cd=document.getElementById('countdown'); if(cd) cd.classList.remove('show'); }
  EMIT({ type:'over', win:!!win, mode: SNOW?'snow':MODE, size:fmtSizePlain(ball.r), sizeCm:Math.round(ball.r*100),
    count: MODE==='room'? (roomTotal-holes.length) : ball.score, roomTotal:roomTotal, reason:reason||'' });
  // Flutter 임베드 시 엔드카드는 Flutter가 표시 → 인게임 DOM 엔드카드는 생략(효과음만)
  if(window.__HOLE_EMBEDDED){ win? SFX.win() : SFX.lose(); return; }
  const roll=MODE==='roll', room=MODE==='room';
  setTimeout(()=>{
    document.getElementById('endTitle').textContent = win? (room?'클리어! 🎉':'목표 달성! 🎉') : (reason||'시간 종료!');
    document.getElementById('endSize').innerHTML = fmtSize(ball.r);
    if(room){
      const cleared=roomTotal-holes.length;
      document.getElementById('endCount').textContent = '없앤 구멍 '+cleared+' / '+roomTotal;
      document.getElementById('endMsg').textContent = win
        ? '방 안의 구멍을 모두 없앴다!'
        : (reason ? '더 키워서 큰 구멍을 덮었어야 해!' : '아직 구멍이 남았어!');
    } else {
      document.getElementById('endCount').textContent = (roll?'모은 물건 ':'빨아들인 ')+ball.score+'개';
      document.getElementById('endMsg').textContent = win
        ? (roll?'멋진 별이 완성됐어요!':'온 동네를 다 삼켰다!')
        : (ball.r>=goalR()*0.7? '조금만 더!' : '다음엔 더 크게!');
    }
    document.getElementById('end').classList.remove('hidden');
    win? SFX.win() : SFX.lose();
  }, 500);
}
function showMenu(){
  running=false; ended=false;
  document.getElementById('end').classList.add('hidden');
  document.getElementById('start').classList.remove('hidden');
}
function curRound(){ return SNOW ? 'snow' : MAP>0 ? ('map'+MAP) : MODE; }
document.getElementById('modeRoll').addEventListener('click', ()=> beginRound('roll'));
document.getElementById('modeHole').addEventListener('click', ()=> beginRound('hole'));
document.getElementById('modeSnow').addEventListener('click', ()=> beginRound('snow'));
document.getElementById('mapBtn1').addEventListener('click', ()=> beginRound('map1'));
document.getElementById('mapBtn2').addEventListener('click', ()=> beginRound('map2'));
document.getElementById('mapBtn3').addEventListener('click', ()=> beginRound('map3'));
document.getElementById('mapBtn4').addEventListener('click', ()=> beginRound('map4'));
document.getElementById('mapBtn5').addEventListener('click', ()=> beginRound('map5'));
document.getElementById('mapBtn6').addEventListener('click', ()=> beginRound('map6'));
// 일시정지(스탠드얼론 DOM): 임베드(Flutter)에서는 Flutter HUD가 담당
function pauseGame(){ if(!running||ended) return; running=false; moveVec={x:0,y:0}; endStick(); document.getElementById('pauseVeil').classList.remove('hidden'); }
function resumeGame(){ if(ended) return; document.getElementById('pauseVeil').classList.add('hidden'); running=true; }
document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('pResume').addEventListener('click', resumeGame);
document.getElementById('pAgain').addEventListener('click', function(){ document.getElementById('pauseVeil').classList.add('hidden'); beginRound(curRound()); });
document.getElementById('pHome').addEventListener('click', function(){ document.getElementById('pauseVeil').classList.add('hidden'); running=false; showMenu(); });
document.getElementById('eventToggle').addEventListener('click', function(){
  document.getElementById('eventModes').classList.toggle('hidden');
});
document.getElementById('againBtn').addEventListener('click', ()=> beginRound(curRound()));
document.getElementById('menuBtn').addEventListener('click', showMenu);

/* ===================== 리사이즈(레터박스 세로) ===================== */
function resize(){
  const screen=document.querySelector('.screen');
  const aw=screen.clientWidth||innerWidth, ah=screen.clientHeight||innerHeight;
  const MIN=9/16, MAX=3/4;
  let ar=Math.max(MIN, Math.min(MAX, aw/ah));
  let w,h;
  if(aw/ah>ar){ h=ah; w=Math.round(ah*ar); } else { w=aw; h=Math.round(aw/ar); }
  const st=document.getElementById('stage');
  st.style.width=w+'px'; st.style.height=h+'px';
  VIEW.w=w; VIEW.h=h;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
addEventListener('orientationchange', ()=>setTimeout(resize,200));

/* ===================== 유틸 ===================== */
function rand(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function angDiff(a,b){ let d=b-a; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; return d; }

/* ===================== 부팅 ===================== */
initThree();
resize();
updateHUD();
requestAnimationFrame(loop);
})();
</script>
<script>
/* Flutter 셸 연동: ?mode= 자동시작 + 임베드 시 인게임 메뉴/엔드카드 숨김 + 부모(Flutter) 재시작 명령 수신 */
(function(){
  var EMBEDDED = false;
  try { EMBEDDED = (window.parent && window.parent !== window); } catch(e){ EMBEDDED = true; }
  window.__HOLE_EMBEDDED = EMBEDDED;
  function post(o){ try{ if(EMBEDDED) window.parent.postMessage(Object.assign({hole:true},o), '*'); }catch(e){} }
  var MODEMAP = { roll:'modeRoll', hole:'modeHole', room:'modeRoom', snow:'modeSnow' };
  function startMode(mode){
    // 모든 모드(map1~6·dung·dungcity·snow·roll·hole·room)는 엔진이 직접 처리
    if(window.__holeEngine && window.__holeEngine.start){ window.__holeEngine.start(mode); post({type:'start', mode:mode}); return; }
    var btn = document.getElementById(MODEMAP[mode] || 'modeRoll');
    if(btn){ btn.click(); post({type:'start', mode:mode}); }
  }

  // 임베드되면 모드선택(start)·엔드카드(end)·HUD는 Flutter가 담당 → DOM 숨김
  if(EMBEDDED){
    document.body.classList.add('embedded');
    var s=document.getElementById('start'); if(s) s.classList.add('hidden');
    var e0=document.getElementById('end'); if(e0) e0.classList.add('hidden');
    // 스테이지(레터박스) 사각형을 Flutter로 알려 HUD 정렬 → resize/orientation 시 갱신
    var emitLayout=function(){
      try{
        var r=document.getElementById('stage').getBoundingClientRect();
        post({type:'layout', x:r.left, y:r.top, w:r.width, h:r.height});
      }catch(e){}
    };
    window.__holeEmitLayout = emitLayout;
    addEventListener('resize', emitLayout);
    addEventListener('orientationchange', function(){ setTimeout(emitLayout,260); });
    // 초기 1회 + 약간의 지연 후 재전송(레이아웃 안정화)
    emitLayout(); setTimeout(emitLayout, 300); setTimeout(emitLayout, 900);
  }

  // ?mode= 자동 시작
  try{
    var m = new URLSearchParams(location.search).get('mode');
    if(m && (MODEMAP[m] || /^map[1-6]$/.test(m) || m==='dung' || m==='dungcity')) startMode(m);
  }catch(e){}

  // Flutter → 게임 명령 수신 (엔드카드 "다시 하기" / 모드 전환)
  window.addEventListener('message', function(ev){
    var d = ev.data;
    if(d && typeof d==='object' && d.holeCmd==='restart'){ startMode(d.mode || 'roll'); }
  });
})();
</script>
